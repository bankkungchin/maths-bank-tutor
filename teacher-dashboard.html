    fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'deleteFace', token: TEACHER_TOKEN, studentId: studentId }) }).catch(() => {});
  }
}

async function syncFaceToSheet(studentId, name) {
  if (!SCRIPT_URL) return;
  const store = loadFaceStore();
  try {
    await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'saveFace', token: TEACHER_TOKEN, studentId: studentId, name: name, descriptors: store[studentId] || [] }) });
  } catch(e) { console.error('syncFace error:', e); }
}

async function loadFacesFromSheet() {
  if (!SCRIPT_URL) return;
  try {
    const res = await fetch(`${SCRIPT_URL}?action=listFaces&token=${encodeURIComponent(TEACHER_TOKEN)}&t=${Date.now()}`);
    const result = await res.json();
    if (result.ok && result.faces) {
      const store = loadFaceStore();
      Object.keys(result.faces).forEach(id => { store[id] = result.faces[id]; });
      saveFaceStore(store);
      const n = Object.keys(result.faces).length;
      if (n > 0) toast(`โหลดข้อมูลใบหน้า ${n} คนจาก Sheet`, 'success');

/* ---------- โหมดสแกนหน้าใน kiosk ---------- */
function setKioskMode(mode) {
  state.kiosk.mode = mode;
  const pinPanel = document.getElementById('kioskPinPanel');
  const facePanel = document.getElementById('kioskFacePanel');
  const pinBtn = document.getElementById('kioskModePinBtn');
  const faceBtn = document.getElementById('kioskModeFaceBtn');
  if (!pinPanel || !facePanel) return;
  const setActive = (btn, on) => {
    if (!btn) return;
    btn.classList.toggle('btn--primary', on);
    btn.classList.toggle('btn--ghost', !on);
  };
  if (mode === 'face') {
    pinPanel.style.display = 'none';
    facePanel.style.display = '';
    setActive(pinBtn, false); setActive(faceBtn, true);
    startFaceScan();
  } else {
    stopFaceScan();
    facePanel.style.display = 'none';
    pinPanel.style.display = '';
    setActive(faceBtn, false); setActive(pinBtn, true);
  }
}

async function startFaceScan() {
  stopFaceScan();
  const statusEl = document.getElementById('faceScanStatus');
  const g = state.data.groups.find(x => x.id === state.kiosk.groupId);
  if (!g) return;
  const enrolledCount = g.students.filter(s => hasFaceData(s.id)).length;
  if (enrolledCount === 0) {
    if (statusEl) statusEl.textContent = 'ยังไม่มีนักเรียนลงทะเบียนใบหน้าในกลุ่มนี้ — ไปที่รายชื่อนักเรียน กดปุ่ม 📷 ก่อน';
    return;
  }
  if (statusEl) statusEl.textContent = `กำลังเปิดกล้อง... (ลงทะเบียนแล้ว ${enrolledCount}/${g.students.length} คน)`;
  try {
    const results = await Promise.all([
      ensureFaceApi(),
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640 } })
    ]);
    _faceStream = results[1];
    const video = document.getElementById('faceScanVideo');
    if (!video) { stopFaceScan(); return; }
    video.srcObject = _faceStream;
    if (statusEl) statusEl.textContent = 'มองกล้องตรงๆ ทีละคน...';
    _faceScanTimer = setInterval(faceScanTick, FACE_CONFIG.scanIntervalMs);
  } catch(e) {
    if (statusEl) statusEl.textContent = 'เปิดกล้องไม่สำเร็จ: ' + e.message + ' — ใช้โหมด PIN แทน';
  }
}

async function faceScanTick() {
  if (_faceScanBusy || _faceCandidate) return;
  const video = document.getElementById('faceScanVideo');
  if (!video || !video.srcObject) return;
  _faceScanBusy = true;
  try {
    const det = await detectDescriptor(video);
    const statusEl = document.getElementById('faceScanStatus');
    if (det) {
      const g = state.data.groups.find(x => x.id === state.kiosk.groupId);
      const match = matchFace(Array.from(det.descriptor), g);
      if (match) {
        const att = getAttendance(state.kiosk.groupId, state.kiosk.sessionNo);
        const existing = att.records[match.student.id];
        if (existing && existing.status !== 'pending') {
          if (statusEl) statusEl.textContent = `${match.student.name} เช็คชื่อแล้ว (${statusLabel(existing.status)}) — คนถัดไปเชิญ`;
        } else {
          _faceCandidate = match.student;
          showFaceCandidate(match.student, match.distance);
        }
      } else {
        if (statusEl) statusEl.textContent = 'พบใบหน้าแต่จับคู่ไม่ได้ — ขยับใกล้กล้อง เพิ่มแสง หรือใช้ PIN แทน';
      }
    }
  } catch(e) { console.error('face scan error:', e); }
  _faceScanBusy = false;
}

function showFaceCandidate(student, distance) {
  const box = document.getElementById('faceCandidateBox');
  if (!box) { _faceCandidate = null; return; }
  const confidence = Math.max(0, Math.min(99, Math.round((1 - distance / FACE_CONFIG.matchThreshold) * 100)));
  box.style.display = '';
  box.innerHTML = `
    <div style="font-size:24px; font-weight:700;">${student.name}</div>
    <div style="font-size:12px; color:var(--gray-dark); margin:2px 0 12px;">ความมั่นใจ ~${confidence}% — ใช่คุณไหม?</div>
    <div style="display:flex; gap:8px; justify-content:center;">
      <button class="btn btn--primary" onclick="confirmFaceCheckin()">✓ ใช่ เช็คชื่อเลย</button>
      <button class="btn btn--ghost" onclick="dismissFaceCandidate()">ไม่ใช่</button>
    </div>
  `;
}

function dismissFaceCandidate(keepStatus) {
  _faceCandidate = null;
  const box = document.getElementById('faceCandidateBox');
  if (box) { box.style.display = 'none'; box.innerHTML = ''; }
  if (!keepStatus) {
    const statusEl = document.getElementById('faceScanStatus');
    if (statusEl) statusEl.textContent = 'มองกล้องตรงๆ ทีละคน...';
  }
}

function confirmFaceCheckin() {
  const student = _faceCandidate;
  if (!student) return;
  const g = state.data.groups.find(x => x.id === state.kiosk.groupId);
  if (!g) return;
  const att = getAttendance(state.kiosk.groupId, state.kiosk.sessionNo);
  const kioskSession = (g.sessions || []).find(s => s.no === state.kiosk.sessionNo);
  const checkInTime = nowTimeStr();
  const status = calcStatusFromTime(checkInTime, g, kioskSession);
  att.records[student.id] = { status: status, checkInTime: checkInTime, note: 'สแกนใบหน้า' };
  saveData();
  autoSync();
  dismissFaceCandidate(true);
  const statusEl = document.getElementById('faceScanStatus');
  const lateMin = timeStrToMinutes(checkInTime) - timeStrToMinutes(sessionStartTimeStr(kioskSession, g));
  if (statusEl) statusEl.textContent = `✓ ${student.name} · ${status === 'present' ? 'ตรงเวลา' : 'สาย +' + lateMin + ' นาที'} · ${checkInTime} น.`;
  renderKioskList();
  renderKioskStats();
  setTimeout(() => {
    const el = document.getElementById('faceScanStatus');
    if (el && !_faceCandidate) el.textContent = 'มองกล้องตรงๆ ทีละคน...';
  }, 2500);
}

function stopFaceScan() {
  if (_faceScanTimer) { clearInterval(_faceScanTimer); _faceScanTimer = null; }
  if (_faceStream) { _faceStream.getTracks().forEach(tr => tr.stop()); _faceStream = null; }
  _faceCandidate = null;
  _faceScanBusy = false;
}

function exitKiosk() {
  stopFaceScan();
  state.view = 'attendance';
  renderAll();
}

/* ===========================================================
   LEAVE REQUESTS + LINE SUMMARY
   =========================================================== */
function buildSessionSummaryText(g, sess) {
  const att = sess.attendance;
  const rec = id => (att && att.records[id]) || { status: 'pending' };
  const startMin = timeStrToMinutes(sessionStartTimeStr(sess, g));
  const lists = { present: [], late: [], leave: [], absent: [], pending: [] };
  g.students.forEach(s => {
    const r = rec(s.id);
    if (r.status === 'late') {
      const plus = r.checkInTime ? '+' + (timeStrToMinutes(r.checkInTime) - startMin) : '';
      const why = r.note && r.note !== 'สาย' && r.note !== 'เช็คออนไลน์' ? ', ' + r.note : '';
      lists.late.push(`${s.name} (${plus}${why})`);
    } else if (r.status === 'leave') {
      lists.leave.push(`${s.name}${r.note ? ' (' + r.note + ')' : ''}`);
    } else if (r.status === 'absent') {
      lists.absent.push(s.name);
    } else if (r.status === 'present') {
      lists.present.push(s.name);
    } else {
      lists.pending.push(s.name);
    }
  });
  let text = `📋 ${g.name} · คาบ ${sess.no} · ${thDateFull(sess.date)}\n`;
  text += `✅ มา ${lists.present.length} · ⏰ สาย ${lists.late.length} · 🟦 ลา ${lists.leave.length} · ❌ ขาด ${lists.absent.length}`;
  if (lists.pending.length) text += ` · ⬜ ยังไม่เช็ค ${lists.pending.length}`;
  if (lists.late.length)   text += `\n⏰ สาย: ${lists.late.join(', ')}`;
  if (lists.leave.length)  text += `\n🟦 ลา: ${lists.leave.join(', ')}`;
  if (lists.absent.length) text += `\n❌ ขาด: ${lists.absent.join(', ')}`;
  return text;
}

function updateSummaryPreview(groupId, noStr) {
  const g = state.data.groups.find(x => x.id === groupId);
  const sess = g && (g.sessions || []).find(s => s.no === Number(noStr));
  const el = document.getElementById('summaryPreview');
  if (g && sess && el) el.textContent = buildSessionSummaryText(g, sess);

let _leaveRequestsCache = [];

async function showLeaveRequestsModal() {
  if (!SCRIPT_URL) { toast('ต้องเชื่อม Google Sheet ก่อน (ใส่ SCRIPT_URL)', 'error'); return; }
  toast('กำลังโหลดรายการแจ้งลา...', 'success');
  try {
    const url = `${SCRIPT_URL}?action=listLeave&token=${encodeURIComponent(TEACHER_TOKEN)}&t=${Date.now()}`;
    const res = await fetch(url);
    const result = await res.json();
    if (!result.ok) { toast('โหลดไม่สำเร็จ: ' + (result.error || ''), 'error'); return; }
    _leaveRequestsCache = result.requests || [];
    renderLeaveRequestsModal();
  } catch(e) { toast('เชื่อมต่อไม่ได้: ' + e.message, 'error'); }
}

function isLeaveApplied(r) {
  const g = state.data.groups.find(x => x.id === r.groupId);
  if (!g) return false;
  const sess = (g.sessions || []).find(s => s.no === Number(r.sessionNo));
  const rec = sess && sess.attendance && sess.attendance.records[r.studentId];
  if (!rec) return false;
  if (r.type === 'แจ้งสาย') return !!(rec.note && rec.note.includes('แจ้งสาย'));
  return rec.status === 'leave';
}

function renderLeaveRequestsModal() {
  const reqs = _leaveRequestsCache;
  const rows = reqs.length === 0
    ? '<div style="text-align:center; color:var(--gray-dark); padding:20px;">ไม่มีรายการแจ้งลา</div>'
    : reqs.map((r, i) => {
        const applied = isLeaveApplied(r);
        const when = r.submittedAt ? String(r.submittedAt).slice(0, 16).replace('T', ' ') : '';
        return `
        <div style="display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; ${applied ? 'opacity:.55;' : ''}">
          <div style="flex:1; min-width:0;">
            <b>${r.studentName}</b> · <span style="color:#2B6CB0; font-weight:600;">${r.type}</span>${r.reason ? ' — ' + r.reason : ''}
            <div style="font-size:12px; color:var(--gray-dark);">${r.groupName} · คาบ ${r.sessionNo} · ${thDate(r.sessionDate)} · แจ้งเมื่อ ${when}</div>
          </div>
          ${applied
            ? '<span style="font-size:12px; color:var(--success); white-space:nowrap;">✓ บันทึกแล้ว</span>'
            : `<button class="btn btn--primary btn--xs" onclick="applyLeaveRequest(${i})">บันทึกลงตาราง</button>`}
        </div>`;
      }).join('');
  showModal({
    title: `รายการแจ้งลา/แจ้งสาย (${reqs.length})`,
    body: `<div style="max-height:340px; overflow-y:auto;">${rows}</div>
           <p style="font-size:12px; color:var(--gray-dark); margin-top:10px;">
             "บันทึกลงตาราง" = ใส่สถานะ 🟦 ลา + หมายเหตุลงคาบนั้น แล้ว sync ขึ้น Sheet อัตโนมัติ<br>
             ประเภท "แจ้งสาย" จะบันทึกเป็นหมายเหตุ ไม่เปลี่ยนสถานะ · ถ้าครูไม่กดบันทึก ระบบก็ยังกันให้ตอน "จบคาบ" (คนแจ้งลาจะไม่ถูกนับขาด)
           </p>`,
    actions: [
      { label: 'ปิด', class: 'btn--ghost', onClick: closeModal },
      { label: 'บันทึกทั้งหมด', class: 'btn--primary', onClick: applyAllLeaveRequests }
    ]
  });
}

function applyLeaveRequest(idx) {
  const r = _leaveRequestsCache[idx];
  if (!r) return;
  const g = state.data.groups.find(x => x.id === r.groupId);
  if (!g) { toast('ไม่พบกลุ่ม ' + r.groupName + ' ในเครื่องนี้', 'error'); return; }
  const att = getAttendance(g.id, Number(r.sessionNo));
  if (!att) { toast('ไม่พบคาบที่ ' + r.sessionNo, 'error'); return; }
  if (!att.records[r.studentId]) att.records[r.studentId] = { status: 'pending', checkInTime: null, note: '' };
  const rec = att.records[r.studentId];
  if (r.type === 'แจ้งสาย') {
    if (!(rec.note && rec.note.includes('แจ้งสาย'))) {
      rec.note = 'แจ้งสายล่วงหน้า' + (r.reason ? ': ' + r.reason : '') + (rec.note ? ' · ' + rec.note : '');
    }
  } else {
    rec.status = 'leave';
    rec.checkInTime = null;
    rec.note = r.type + (r.reason ? ' — ' + r.reason : '');
  }
  saveData();
  autoSync();
  renderLeaveRequestsModal();
  toast(`บันทึก ${r.studentName} (${r.type}) แล้ว`, 'success');
}

function applyAllLeaveRequests() {
  let n = 0;
  _leaveRequestsCache.forEach((r, i) => {
    if (!isLeaveApplied(r)) {
      const g = state.data.groups.find(x => x.id === r.groupId);
      if (g) { applyLeaveRequest(i); n++; }
    }
  });
  toast(`บันทึก ${n} รายการแล้ว`, 'success');
  renderMain();
}

function updateSession(groupId, sessionNo, field, value) {
  const g = state.data.groups.find(x => x.id === groupId);
  if (!g) return;
  const s = (g.sessions || []).find(x => x.no === sessionNo);
  if (!s) return;
  if (field === 'date') s.date = value;
  else if (field === 'time') s.customTime = value || null;
  else if (field === 'note') s.note = value;
  saveData();
  // อัปเดต endDate ถ้าแก้คาบสุดท้าย
  if (s.no === g.sessions.length) g.endDate = s.date;
  toast('บันทึกแล้ว', 'success');
}

function addSession(groupId) {
  const g = state.data.groups.find(x => x.id === groupId);
  if (!g) return;
  ensureSessions(g);
  const last = g.sessions[g.sessions.length - 1];
  const newDate = last ? addDays(last.date, 7) : g.startDate;
  g.sessions.push({
    no: g.sessions.length + 1,
    date: newDate,
    customTime: null,
    status: 'upcoming',
    note: ''
  });
  g.sessionsTotal = g.sessions.length;
  g.endDate = g.sessions[g.sessions.length - 1].date;
  saveData();
  renderAll();
  toast(`เพิ่มคาบที่ ${g.sessions.length} แล้ว`, 'success');
}

function deleteSession(groupId, sessionNo) {
  const g = state.data.groups.find(x => x.id === groupId);

/* ===========================================================
   SYNC — อัปโหลดขึ้น Google Sheet (POST)
   =========================================================== */
async function syncToSheet(silent) {
  if (!SCRIPT_URL) {
    if (silent) return; // ไม่เตือนในโหมด auto-sync
    showModal({
      title: 'ยังไม่ได้เชื่อม Google Sheet',
      body: 'ต้องใส่ SCRIPT_URL ในไฟล์ teacher-dashboard.html ก่อน (บรรทัดที่เขียนว่า <code>const SCRIPT_URL = \'\';</code>)<br><br>ดูวิธีได้ใน SETUP-GUIDE.md<br><br>ถ้ายังไม่เชื่อม Sheet ข้อมูลจะเก็บในเบราว์เซอร์ (localStorage) — ปลอดภัยตราบใดที่ไม่ล้าง cache หรือเปลี่ยนเครื่อง',
      actions: [{ label: 'รับทราบ', class: 'btn--primary', onClick: closeModal }]
    });
    return;
  }
  if (state.onlineCheckin && state.onlineCheckin.code) {
    if (!silent) toast('กำลังเช็คชื่อออนไลน์อยู่ — กด "จบคาบ" ก่อนแล้วค่อย Sync (กันข้อมูลเช็คชื่อหาย)', 'error');
    return;
  }
  if (!silent) toast('กำลังอัปโหลดข้อมูล...', 'success');
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'syncData', token: TEACHER_TOKEN, data: state.data })
    });
    const result = await res.json();
    if (result.ok) {
      // อัปเดต last sync time
      state.lastSync = new Date().toISOString();
      try { localStorage.setItem('mathsBankLastSync', state.lastSync); } catch(e){}
      updateSyncIndicator();
      if (!silent) {
        const attCount = result.attendanceRecords || 0;
        toast(`อัปโหลดสำเร็จ · ${state.data.groups.length} กลุ่ม · ${attCount} รายการเช็คชื่อ`, 'success');
      }
    } else {
      if (!silent) toast('อัปโหลดไม่สำเร็จ: ' + (result.error || 'unknown'), 'error');
    }
  } catch(e) {
    if (!silent) toast('เชื่อมต่อไม่ได้: ' + e.message, 'error');
  }
}

/* Auto-sync — เรียกหลังจากมีการแก้ข้อมูล (เช็คชื่อ, บันทึกวันหยุด, etc.) */
let _autoSyncTimer = null;
function autoSync() {
  if (!SCRIPT_URL) return; // ไม่ auto-sync ถ้ายังไม่ได้เชื่อม Sheet
  if (state.onlineCheckin && state.onlineCheckin.code) return; // กันเขียนทับข้อมูลเช็คชื่อออนไลน์ที่ server กำลังบันทึก
  clearTimeout(_autoSyncTimer);
  _autoSyncTimer = setTimeout(() => syncToSheet(true), 3000); // รอ 3 วินาทีไม่มีการแก้แล้วค่อย sync
}

/* Update sync indicator in sidebar */
function updateSyncIndicator() {
  const btn = document.getElementById('btnSync');
  if (!btn) return;
  if (!SCRIPT_URL) {
    btn.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Local
    `;
    btn.title = 'เก็บในเบราว์เซอร์ (ยังไม่ได้เชื่อม Sheet)';
    btn.style.background = '';
    btn.style.color = '';
  } else {
    const last = state.lastSync ? new Date(state.lastSync) : null;
    const timeStr = last ? `${last.getHours()}:${String(last.getMinutes()).padStart(2,'0')}` : '--:--';
    btn.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      ${timeStr}
    `;
    btn.title = `อัปโหลดขึ้น Sheet${last ? ' · ล่าสุด ' + timeStr : ''}`;
    btn.style.background = 'var(--success-bg)';
    btn.style.color = 'var(--success)';
  }
}

async function loadFromSheet() {
  if (!SCRIPT_URL) {
    toast('ยังไม่ได้เชื่อม Google Sheet', 'error');
    return;
  }
  toast('กำลังดาวน์โหลด...', 'success');
  try {
    const url = `${SCRIPT_URL}?action=loadData&t=${Date.now()}`;
    const res = await fetch(url);
    const result = await res.json();
    if (result.ok && result.data) {
      state.data = result.data;
      state.data.groups.forEach(g => ensureSessions(g));
      saveData();
      if (state.data.groups.length > 0 && !state.selectedGroupId) {
        state.selectedGroupId = state.data.groups[0].id;
      }
      renderAll();
      toast(`ดาวน์โหลดสำเร็จ · ${state.data.groups.length} กลุ่ม`, 'success');
      loadFacesFromSheet();
    } else {
      toast('ดาวน์โหลดไม่สำเร็จ: ' + (result.error || 'unknown'), 'error');
    }
  } catch(e) {
    toast('เชื่อมต่อไม่ได้: ' + e.message, 'error');
  }
}

/* ===========================================================
   SETTINGS — เปลี่ยน PIN
   =========================================================== */
function showSettings() {
  showModal({
    title: 'ตั้งค่า',
    body: `
      <div style="margin-bottom:16px;">
        <label style="font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gray-dark); font-weight:600; font-family:var(--font-num);">เปลี่ยน PIN 6 หลัก</label>
        <input type="text" id="newPin" maxlength="6" pattern="[0-9]*" placeholder="PIN ใหม่"
               style="width:100%; padding:10px 14px; margin-top:6px; border:1px solid var(--line); border-radius:8px; outline:none; font-family:var(--font-num); letter-spacing:0.3em; text-align:center; font-size:18px;"
               oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gray-dark); font-weight:600; font-family:var(--font-num);">ยืนยัน PIN</label>
        <input type="text" id="confirmPin" maxlength="6" pattern="[0-9]*" placeholder="ยืนยัน PIN ใหม่"
               style="width:100%; padding:10px 14px; margin-top:6px; border:1px solid var(--line); border-radius:8px; outline:none; font-family:var(--font-num); letter-spacing:0.3em; text-align:center; font-size:18px;"
               oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      </div>
      <div style="padding-top:12px; border-top:1px solid var(--line); display:flex; gap:6px;">
        <button class="btn btn--ghost btn--sm" onclick="loadFromSheet()" style="flex:1;">ดาวน์โหลดจาก Sheet</button>
        <button class="btn btn--ghost btn--sm" onclick="exportData()" style="flex:1;">Export JSON</button>
      </div>
    `,
    actions: [
      { label: 'ยกเลิก', class: 'btn--ghost', onClick: closeModal },
      { label: 'บันทึก PIN', class: 'btn--primary', onClick: () => {
        const p1 = document.getElementById('newPin').value;
        const p2 = document.getElementById('confirmPin').value;
        if (p1.length !== 6) { toast('PIN ต้องเป็น 6 หลัก', 'error'); return; }
        if (p1 !== p2) { toast('PIN ไม่ตรงกัน', 'error'); return; }
        setPin(p1);
        closeModal();
        toast('เปลี่ยน PIN แล้ว', 'success');
      }}
    ]
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `maths-bank-data-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Export ข้อมูลแล้ว', 'success');
}

/* ===========================================================
   MODAL + TOAST
   =========================================================== */
function showModal({ title, body, actions }) {
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="modal__title">${title}</div>
    <div class="modal__body">${body}</div>
    <div class="modal__actions" id="modalActions"></div>
  `;
  const actionsEl = document.getElementById('modalActions');
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + a.class;
    btn.textContent = a.label;
    btn.addEventListener('click', a.onClick);
    actionsEl.appendChild(btn);
  });
  document.getElementById('modalBackdrop').classList.add('is-open');
}
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('is-open');
}
document.getElementById('modalBackdrop').addEventListener('click', (e) => {
  if (e.target.id === 'modalBackdrop') { stopEnrollCamera(); closeModal(); }
});

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ===========================================================
   RENDER ALL
   =========================================================== */
function renderAll() {
  renderSidebar();
  renderMain();
}

/* ===========================================================
   INIT
   =========================================================== */
function init() {
  // ตรวจ session ว่า login แล้วหรือยัง
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    showApp();
  } else {
    // ตรวจ lock ก่อน
    const lock = getLock();
    if (lock.lockedUntil > Date.now()) {
      const mins = Math.ceil((lock.lockedUntil - Date.now()) / 60000);
      showLoginWarn(`ระบบล็อค กรุณารอ ${mins} นาที`);
    }
  }

  // keypad
  document.querySelectorAll('#keypad button').forEach(b => {
    b.addEventListener('click', () => handleKeypad(b.dataset.key));
  });

  // keyboard support
  document.addEventListener('keydown', (e) => {
    // ถ้าอยู่ในหน้า login
    if (document.getElementById('loginView').style.display !== 'none') {
      if (e.key >= '0' && e.key <= '9') handleKeypad(e.key);
      else if (e.key === 'Backspace') handleKeypad('back');
      else if (e.key === 'Escape') { state.pin = ''; renderPinDisplay(); }
    } else {
      // ในหน้า app
      if (e.key === 'Escape') closeModal();
    }
  });

  // buttons
  document.getElementById('btnOverview').addEventListener('click', () => {
    state.view = 'overview';
    renderAll();
  });
  document.getElementById('btnAttendance').addEventListener('click', () => {
    state.view = 'attendance';
    renderAll();
  });
  document.getElementById('btnAddGroup').addEventListener('click', addGroup);
  document.getElementById('btnSync').addEventListener('click', () => syncToSheet(false));
  document.getElementById('btnSettings').addEventListener('click', showSettings);
  document.getElementById('btnLogout').addEventListener('click', logout);

  // Kiosk keyboard support (when in kiosk mode)
  document.addEventListener('keydown', (e) => {
    if (state.view !== 'kiosk') return;
    if (e.key >= '0' && e.key <= '9') handleKioskKeypad(e.key);
    else if (e.key === 'Backspace') { e.preventDefault(); handleKioskKeypad('back'); }
    else if (e.key === 'Escape') { state.view = 'attendance'; renderAll(); }
  });
}

init();
</script>

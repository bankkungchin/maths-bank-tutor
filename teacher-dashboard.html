<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Teacher Dashboard — Maths Bank Tutor</title>
<meta name="description" content="แดชบอร์ดครู — จัดการกลุ่มเรียน นักเรียน ตารางคาบ">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- QR Code library (for online check-in) -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
/* ===========================================================
   DESIGN SYSTEM — Maths Bank Tutor (ห้ามเปลี่ยน)
   =========================================================== */
:root {
  --bg:           #FCFBF9;
  --bg-soft:      #F5F3EF;
  --bg-canvas:    #ECEAE6;
  --black:        #17150F;
  --orange:       #E8571F;
  --gray-dark:    #6B675E;
  --gray-soft:    #A8A49B;
  --line:         #D8D4CC;
  --line-strong:  #17150F;
  --danger:       #B83C0A;
  --danger-bg:    #FFF1E8;
  --success:      #2D6A4F;
  --success-bg:   #E8F3EE;

  --radius-pill:  999px;
  --radius-card:  18px;
  --radius-sm:    10px;

  --shadow-card:  0 1px 0 rgba(23,21,15,.04), 0 12px 28px -16px rgba(23,21,15,.18);
  --shadow-pop:   0 24px 60px -20px rgba(23,21,15,.40);

  --font-thai:    'Anuphan', system-ui, sans-serif;
  --font-num:     'Space Grotesk', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg-canvas); color: var(--black); font-family: var(--font-thai); -webkit-font-smoothing: antialiased; }
body { font-size: 14px; line-height: 1.55; min-height: 100vh; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; }
input, select { font-family: inherit; font-size: 14px; color: var(--black); }
.num { font-family: var(--font-num); font-feature-settings: 'tnum' 1, 'lnum' 1; }

/* ===========================================================
   LOGIN SCREEN
   =========================================================== */
.login-wrap {
  min-height: 100vh; display: grid; place-items: center;
  padding: 24px;
}
.login-card {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  padding: 40px 36px;
  max-width: 420px; width: 100%;
  box-shadow: var(--shadow-card);
  text-align: center;
}
.login-logo {
  width: 64px; height: 64px;
  background: var(--black); color: var(--bg);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-num); font-weight: 700; font-size: 26px;
  letter-spacing: -0.04em;
  line-height: 1;
  margin: 0 auto 16px;
  overflow: hidden;
  white-space: nowrap;
}
.login-logo span { color: var(--orange); }
.login-title { font-size: 22px; font-weight: 700; }
.login-sub { color: var(--gray-dark); font-size: 13px; margin-top: 4px; }
.login-eyebrow {
  font-family: var(--font-num); font-size: 11px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--orange); font-weight: 600;
  margin-bottom: 8px; display: block;
}

.pin-display {
  display: flex; gap: 8px; justify-content: center;
  margin: 24px 0 16px;
}
.pin-dot {
  width: 44px; height: 56px;
  border: 1.5px solid var(--line);
  border-radius: 10px;
  display: grid; place-items: center;
  font-family: var(--font-num); font-size: 22px; font-weight: 600;
  background: var(--bg);
  transition: all .15s;
}
.pin-dot.filled { border-color: var(--black); }
.pin-dot.error { border-color: var(--danger); background: var(--danger-bg); animation: shake .3s; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* keypad */
.keypad {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; max-width: 280px; margin: 0 auto;
}
.keypad button {
  background: var(--bg-soft); border: 1px solid var(--line);
  border-radius: 12px;
  padding: 18px 0; font-size: 20px; font-weight: 600;
  font-family: var(--font-num);
  transition: all .12s;
}
.keypad button:hover { background: var(--bg-canvas); border-color: var(--line-strong); }
.keypad button:active { transform: scale(.96); }
.keypad button.clear { color: var(--danger); }
.keypad button.back { color: var(--gray-dark); }

.login-warn {
  margin-top: 16px; padding: 10px 14px;
  background: var(--danger-bg); border-radius: 10px;
  font-size: 13px; color: var(--danger);
  display: none;
}
.login-warn.show { display: block; }

.login-hint {
  margin-top: 20px; padding-top: 16px;
  border-top: 1px solid var(--line);
  font-size: 12px; color: var(--gray-dark);
}
.login-hint code {
  background: var(--bg-soft); padding: 2px 8px;
  border-radius: 4px; font-family: var(--font-num);
  color: var(--orange); font-weight: 600;
}

/* ===========================================================
   APP LAYOUT
   =========================================================== */
.app {
  display: grid;
  grid-template-columns: 320px 1fr;
  min-height: 100vh;
}

/* ===== Sidebar ===== */
.sidebar {
  background: var(--bg);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.sidebar__head {
  padding: 18px 20px;
  border-bottom: 1px solid var(--line-strong);
  display: flex; align-items: center; gap: 10px;
}
.sidebar__logo {
  width: 32px; height: 32px;
  background: var(--black); color: var(--bg);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-num); font-weight: 700; font-size: 13px;
  letter-spacing: -0.04em;
  line-height: 1;
  overflow: hidden;
  white-space: nowrap;
  flex-shrink: 0;
}
.sidebar__logo span { color: var(--orange); }
.sidebar__title { font-size: 14px; font-weight: 600; line-height: 1.2; }
.sidebar__title small { display: block; font-size: 10px; color: var(--gray-dark); letter-spacing: 0.16em; text-transform: uppercase; font-weight: 500; margin-top: 2px; }

.sidebar__actions {
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  display: flex; gap: 6px;
}
.sidebar__actions .btn { flex: 1; }

.sidebar__section-label {
  padding: 14px 20px 6px;
  font-family: var(--font-num); font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gray-dark); font-weight: 600;
  display: flex; justify-content: space-between; align-items: center;
}

.group-list { flex: 1; overflow-y: auto; padding: 0 12px 16px; }
.group-item {
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: all .12s;
  margin-bottom: 2px;
  border: 1px solid transparent;
}
.group-item:hover { background: var(--bg-soft); }
.group-item.is-active {
  background: var(--black); color: var(--bg);
  border-color: var(--black);
}
.group-item.is-active .group-item__meta { color: var(--gray-soft); }
.group-item__dot {
  width: 8px; height: 8px; border-radius: 50%; flex: 0 0 8px;
}
.group-item__dot.done { background: var(--black); }
.group-item.is-active .group-item__dot.done { background: var(--bg); }
.group-item__dot.current { background: var(--orange); }
.group-item__dot.upcoming { background: transparent; border: 1.5px solid var(--line); }
.group-item.is-active .group-item__dot.upcoming { border-color: var(--gray-soft); }
.group-item__name { font-size: 13px; font-weight: 500; line-height: 1.25; flex: 1; }
.group-item__meta { font-size: 11px; color: var(--gray-dark); margin-top: 2px; }

.sidebar__foot {
  padding: 12px 16px;
  border-top: 1px solid var(--line);
  display: flex; gap: 6px;
}

/* ===== Main panel ===== */
.main {
  display: flex; flex-direction: column;
  min-width: 0;
}
.main__head {
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 14px 28px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 10;
}
.main__head h1 { font-size: 18px; font-weight: 700; flex: 1; }
.main__head .eyebrow {
  font-family: var(--font-num); font-size: 10px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--orange); font-weight: 600;
  display: block;
}

.mode-badge {
  padding: 4px 10px; border-radius: var(--radius-pill);
  background: var(--black); color: var(--bg);
  font-size: 11px; font-weight: 600;
  font-family: var(--font-num); letter-spacing: 0.08em;
}

.main__body { padding: 24px 28px 80px; flex: 1; }

/* ===========================================================
   CARDS / SECTIONS
   =========================================================== */
.card {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  padding: 22px;
  margin-bottom: 18px;
}
.card__head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; gap: 12px;
}
.card__title {
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  font-family: var(--font-num); color: var(--gray-dark); font-weight: 600;
}
.card__title b { color: var(--black); }
.card__count {
  font-family: var(--font-num); font-size: 12px;
  padding: 3px 10px; border-radius: var(--radius-pill);
  background: var(--bg-soft); color: var(--gray-dark);
}

/* group header card */
.group-header {
  display: grid; grid-template-columns: 1fr auto;
  gap: 20px; align-items: start;
}
.group-header__name {
  font-size: 24px; font-weight: 700;
  border: 0; background: transparent;
  padding: 4px 0; outline: none;
  border-bottom: 2px dashed transparent;
  width: 100%;
}
.group-header__name:focus { border-bottom-color: var(--orange); }
.group-header__name.editing { border-bottom-color: var(--orange); }
.group-header__meta { color: var(--gray-dark); font-size: 13px; margin-top: 4px; }

.level-badge {
  padding: 6px 14px; border-radius: var(--radius-pill);
  font-family: var(--font-num); font-size: 12px; font-weight: 600;
  background: var(--bg-soft); color: var(--black);
  border: 1px solid var(--line);
  white-space: nowrap;
}
.level-badge.lv-4 { background: #FFF1E8; border-color: #FFD2B8; color: #B83C0A; }
.level-badge.lv-5 { background: #EFEFE0; border-color: #D8D4CC; color: #4A463C; }
.level-badge.lv-6 { background: #17150F; border-color: #17150F; color: var(--bg); }

/* form rows */
.form-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
}
.form-field { display: flex; flex-direction: column; gap: 4px; }
.form-field label {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gray-dark); font-weight: 600;
  font-family: var(--font-num);
}
.form-field input, .form-field select {
  padding: 8px 12px;
  border: 1px solid var(--line); border-radius: 8px;
  background: var(--bg);
  outline: none; transition: border-color .15s;
}
.form-field input:focus, .form-field select:focus { border-color: var(--black); }
.form-field .hint { font-size: 11px; color: var(--gray-dark); }

/* buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 14px; border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 600;
  transition: all .15s;
  white-space: nowrap;
  border: 1px solid transparent;
}
.btn--primary { background: var(--black); color: var(--bg); }
.btn--primary:hover { background: var(--orange); }
.btn--ghost { background: var(--bg); color: var(--black); border-color: var(--line-strong); }
.btn--ghost:hover { background: var(--bg-soft); }
.btn--danger { background: var(--danger-bg); color: var(--danger); border-color: transparent; }
.btn--danger:hover { background: var(--danger); color: var(--bg); }
.btn--sm { padding: 6px 10px; font-size: 12px; }
.btn--xs { padding: 4px 8px; font-size: 11px; }
.btn--block { width: 100%; }
.btn--icon { padding: 8px; width: 32px; height: 32px; }

/* progress bar */
.progress {
  height: 8px; background: var(--bg-canvas); border-radius: var(--radius-pill);
  overflow: hidden; border: 1px solid var(--line);
}
.progress__fill { height: 100%; background: var(--orange); border-radius: var(--radius-pill); }

/* ===========================================================
   STUDENT LIST
   =========================================================== */
.student-add-row {
  display: flex; gap: 8px; margin-bottom: 14px;
}
.student-add-row input {
  flex: 1; padding: 9px 14px;
  border: 1px solid var(--line); border-radius: var(--radius-pill);
  outline: none;
}
.student-add-row input:focus { border-color: var(--black); }

.student-list {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 6px;
}
.student-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--bg-soft); border-radius: var(--radius-pill);
  font-size: 13px;
}
.student-row__num {
  font-family: var(--font-num); font-size: 11px; color: var(--gray-soft);
  width: 22px;
}
.student-row__name { flex: 1; font-weight: 500; }
.student-row__del {
  width: 22px; height: 22px; border-radius: 50%;
  background: transparent; color: var(--gray-soft);
  display: grid; place-items: center; font-size: 14px;
  transition: all .15s;
}
.student-row__del:hover { background: var(--danger); color: var(--bg); }

.student-row__pin {
  padding: 4px 10px; border-radius: var(--radius-pill);
  background: var(--bg); border: 1px solid var(--line);
  display: inline-flex; align-items: center; gap: 4px;
  cursor: pointer; transition: all .12s;
}
.student-row__pin:hover {
  background: var(--bg-soft);
  border-color: var(--orange);
  transform: translateY(-1px);
}

/* ===========================================================
   SESSION TABLE
   =========================================================== */
.session-tools {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
}
.session-table-wrap {
  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
}
.session-table { width: 100%; border-collapse: collapse; }
.session-table th {
  background: var(--bg-soft);
  text-align: left;
  font-family: var(--font-num); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gray-dark); font-weight: 600;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
}
.session-table td { padding: 10px 12px; border-bottom: 1px solid var(--line); font-size: 13px; vertical-align: middle; }
.session-table tr:last-child td { border-bottom: 0; }
.session-table tr.is-holiday td { background: var(--danger-bg); }
.session-table tr.is-current td { background: #FFF6F0; }

.session-no-print {
  font-family: var(--font-num); font-weight: 600;
  display: inline-block; width: 24px; text-align: center;
}

.session-input {
  padding: 5px 8px;
  border: 1px solid transparent; border-radius: 6px;
  background: transparent;
  font-family: var(--font-num); font-size: 13px;
  outline: none; width: 100%;
  min-width: 90px;
}
.session-input:hover { border-color: var(--line); }
.session-input:focus { border-color: var(--orange); background: var(--bg); }

.status-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 500;
}
.status-pill.done { background: var(--black); color: var(--bg); }
.status-pill.current { background: var(--orange); color: var(--bg); }
.status-pill.upcoming { background: var(--bg-canvas); color: var(--gray-dark); }
.status-pill.holiday { background: var(--danger); color: var(--bg); }

.row-actions { display: flex; gap: 4px; justify-content: flex-end; }
.row-actions button {
  width: 28px; height: 28px; border-radius: 6px;
  display: grid; place-items: center;
  background: var(--bg-soft); color: var(--gray-dark);
  font-size: 13px; transition: all .12s;
}
.row-actions button:hover { background: var(--black); color: var(--bg); }
.row-actions button.danger:hover { background: var(--danger); }

/* ===========================================================
   OVERVIEW MODE (read-only summary)
   =========================================================== */
.overview-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.overview-card {
  background: var(--bg); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 20px;
  display: flex; flex-direction: column; gap: 12px;
}
.overview-card__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.overview-card__name { font-size: 17px; font-weight: 700; }
.overview-card__meta { font-size: 12px; color: var(--gray-dark); margin-top: 2px; }
.overview-card__progress { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; color: var(--gray-dark); }
.overview-card__progress b { font-family: var(--font-num); font-size: 15px; color: var(--black); }
.overview-card__progress .pct { font-family: var(--font-num); color: var(--orange); font-weight: 600; }

/* ===========================================================
   MODAL (confirm / form)
   =========================================================== */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(23,21,15,.55); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-backdrop.is-open { display: flex; }
.modal {
  background: var(--bg); border-radius: var(--radius-card);
  max-width: 440px; width: 100%; padding: 24px;
  box-shadow: var(--shadow-pop);
  animation: pop .18s ease-out;
}
@keyframes pop { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal__title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.modal__body { color: var(--gray-dark); font-size: 14px; margin-bottom: 20px; }
.modal__actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ===========================================================
   TOAST
   =========================================================== */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--black); color: var(--bg);
  padding: 12px 20px; border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 500;
  z-index: 200; opacity: 0; transition: all .3s;
  box-shadow: var(--shadow-pop);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }

/* ===========================================================
   EMPTY STATE
   =========================================================== */
.empty {
  text-align: center; padding: 60px 24px;
  color: var(--gray-dark);
}
.empty h3 { font-size: 18px; color: var(--black); margin-bottom: 6px; }
.empty p { font-size: 14px; margin-bottom: 16px; }

/* ===========================================================
   RESPONSIVE
   =========================================================== */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: relative; height: auto;
    border-right: 0; border-bottom: 1px solid var(--line-strong);
  }
  .group-list { max-height: 240px; }
  .main__body { padding: 16px; }
  .main__head { padding: 12px 16px; }
  .group-header { grid-template-columns: 1fr; }
  .session-table th:nth-child(4),
  .session-table td:nth-child(4) { display: none; }
}
@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr; }
  .student-list { grid-template-columns: 1fr; }
  .session-table th:nth-child(3),
  .session-table td:nth-child(3) { display: none; }
}

/* ===========================================================
   PRINT
   =========================================================== */
@media screen {
  .print-only { display: none !important; }
}
@media print {
  @page { size: A4; margin: 12mm 14mm; }
  body { background: white !important; font-size: 11pt; }
  .app, .login-wrap { display: none !important; }
  .print-only { display: block !important; }
  .print-report { color: #000; font-family: var(--font-thai); }
  .print-report__head {
    display: flex; justify-content: space-between; align-items: flex-start;
    border-bottom: 2px solid #000; padding-bottom: 12px; margin-bottom: 14px;
  }
  .print-brand { display: flex; align-items: center; gap: 10px; }
  .print-brand__logo {
    width: 36px; height: 36px; background: #000; color: #fff;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-num); font-weight: 700; font-size: 15px;
    letter-spacing: -0.04em; line-height: 1; overflow: hidden; white-space: nowrap;
    flex-shrink: 0;
  }
  .print-brand__logo span { color: var(--orange); }
  .print-brand__name b { font-size: 13pt; }
  .print-brand__name small { font-size: 9pt; color: #555; display: block; margin-top: 2px; }
  .print-report__meta { text-align: right; font-size: 9pt; color: #555; }
  .print-report__meta b { display: block; color: #000; font-size: 10pt; }
  .print-report__title { font-size: 16pt; font-weight: 700; margin: 14px 0 4px; }
  .print-report__sub { color: #444; font-size: 10pt; margin-bottom: 14px; }
  .print-stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    border: 1px solid #000; border-radius: 8px; overflow: hidden; margin-bottom: 14px;
  }
  .print-stats__cell { padding: 8px 10px; border-right: 1px solid #000; }
  .print-stats__cell:last-child { border-right: 0; }
  .print-stats__label { font-size: 8pt; color: #666; letter-spacing: 0.08em; text-transform: uppercase; }

  .print-footer {

/* ===========================================================
   ATTENDANCE — Kiosk + Summary
   =========================================================== */

/* QR Code display in online check-in monitor */
.qr-container {
  background: var(--bg);
  padding: 16px;
  border-radius: 12px;
  display: inline-block;
  margin: 12px auto;
}
.qr-container img,
.qr-container canvas {
  display: block;
  margin: 0 auto;
}
.qr-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

/* Method toggle (QR vs URL) */
.method-toggle {
  display: inline-flex;
  background: rgba(255,255,255,.1);
  border-radius: var(--radius-pill);
  padding: 4px;
  gap: 4px;
  margin-top: 12px;
}
.method-toggle button {
  padding: 8px 16px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-soft);
  transition: all .15s;
  font-family: var(--font-thai);
}
.method-toggle button.is-active {
  background: var(--bg);
  color: var(--black);
}
.method-toggle button:hover:not(.is-active) {
  color: var(--bg);
}

/* Kiosk mode (full-screen PIN check-in) */
.kiosk {
  background: var(--bg);
  min-height: calc(100vh - 60px);
  padding: 24px;
  display: flex; flex-direction: column;
  gap: 16px;
}
.kiosk__head {
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
  flex-wrap: wrap;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line-strong);
}
.kiosk__title {
  font-size: 18px; font-weight: 700;
}
.kiosk__meta {
  color: var(--gray-dark); font-size: 13px; margin-top: 2px;
}
.kiosk__live {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-num); font-size: 14px; font-weight: 600;
  background: var(--black); color: var(--bg);
  padding: 8px 14px; border-radius: var(--radius-pill);
}
.kiosk__live::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--orange); animation: pulse 1.2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.kiosk__progress {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;
  background: var(--bg-soft); border-radius: 12px;
  overflow: hidden;
}
.kiosk__stat {
  padding: 12px 16px;
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
}
.kiosk__stat:last-child { border-right: 0; }
.kiosk__stat-label {
  font-family: var(--font-num); font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gray-dark); margin-bottom: 4px;
}
.kiosk__stat-value {
  font-family: var(--font-num); font-size: 24px; font-weight: 600;
}
.kiosk__stat-value.present { color: var(--success); }
.kiosk__stat-value.late    { color: var(--orange); }
.kiosk__stat-value.absent  { color: var(--danger); }
.kiosk__stat-value.pending { color: var(--gray-dark); }

/* Kiosk body: PIN pad + checked-in list */
.kiosk__body {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  flex: 1;
}
.kiosk__left {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg-soft); border-radius: var(--radius-card);
  padding: 32px 20px;
  text-align: center;
}
.kiosk__prompt {
  font-size: 14px; color: var(--gray-dark); margin-bottom: 8px;
}
.kiosk__student-name {
  font-size: 28px; font-weight: 700; min-height: 36px;
  letter-spacing: -0.01em;
}
.kiosk__student-status {
  margin-top: 8px; min-height: 22px;
  font-size: 14px; font-weight: 500;
}
.kiosk__student-status.ok    { color: var(--success); }
.kiosk__student-status.late  { color: var(--orange); }
.kiosk__student-status.error { color: var(--danger); }

/* Kiosk PIN display (big) */
.kiosk__pin-display {
  display: flex; gap: 10px; justify-content: center;
  margin: 24px 0 16px;
}
.kiosk__pin-dot {
  width: 56px; height: 70px;
  border: 2px solid var(--line-strong);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-num); font-size: 30px; font-weight: 600;
  background: var(--bg);
}
.kiosk__pin-dot.filled { border-color: var(--black); }
.kiosk__pin-dot.success { border-color: var(--success); background: var(--success-bg); }
.kiosk__pin-dot.error   { border-color: var(--danger);   background: var(--danger-bg); animation: shake .3s; }

/* Kiosk keypad (big) */
.kiosk__keypad {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; max-width: 360px; margin: 0 auto;
  width: 100%;
}
.kiosk__keypad button {
  background: var(--bg); border: 1px solid var(--line-strong);
  border-radius: 14px;
  padding: 24px 0; font-size: 28px; font-weight: 600;
  font-family: var(--font-num);
  transition: all .12s;
}
.kiosk__keypad button:hover { background: var(--bg-canvas); }
.kiosk__keypad button:active { transform: scale(.96); background: var(--orange); color: var(--bg); }
.kiosk__keypad button.clear { color: var(--danger); }
.kiosk__keypad button.back { color: var(--gray-dark); }

/* Kiosk right: checked-in list */
.kiosk__right {
  display: flex; flex-direction: column;
  background: var(--bg); border: 1px solid var(--line);
  border-radius: var(--radius-card);
  overflow: hidden;
}
.kiosk__right-head {
  padding: 14px 18px;
  background: var(--bg-soft); border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
}
.kiosk__right-title {
  font-family: var(--font-num); font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gray-dark); font-weight: 600;
}
.kiosk__right-body {
  flex: 1; overflow-y: auto; padding: 8px;
  max-height: 500px;
}
.checkin-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 14px;
  border: 1px solid transparent;
  margin-bottom: 2px;
}
.checkin-row.is-present { background: var(--success-bg); }
.checkin-row.is-late    { background: #FFF6F0; }
.checkin-row.is-absent  { background: var(--danger-bg); }
.checkin-row.is-pending { background: transparent; color: var(--gray-dark); }
.checkin-row.is-leave   { background: #EAF2FB; }
.checkin-row__num {
  font-family: var(--font-num); font-size: 11px;
  color: var(--gray-soft); width: 24px;
}
.checkin-row__name { flex: 1; font-weight: 500; }
.checkin-row__time {
  font-family: var(--font-num); font-size: 13px;
  color: var(--gray-dark);
}
.checkin-row__badge {
  padding: 3px 10px; border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 600;
}
.checkin-row__badge.present { background: var(--success); color: var(--bg); }
.checkin-row__badge.late    { background: var(--orange);  color: var(--bg); }
.checkin-row__badge.absent  { background: var(--danger);  color: var(--bg); }
.checkin-row__badge.pending { background: var(--bg-canvas); color: var(--gray-dark); }
.checkin-row__badge.leave   { background: #2B6CB0; color: var(--bg); }

.kiosk__actions {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.kiosk__actions .btn { flex: 1; min-width: 140px; }

/* Attendance summary view */
.att-summary-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 0; margin-bottom: 18px;
  background: var(--black); color: var(--bg);
  border-radius: var(--radius-card);
  overflow: hidden;
}
.att-summary-cell {
  padding: 18px 22px;
  border-right: 1px solid rgba(255,255,255,.08);
}
.att-summary-cell:last-child { border-right: 0; }
.att-summary-label {
  font-family: var(--font-num); font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gray-soft); margin-bottom: 4px;
}
.att-summary-value {
  font-family: var(--font-num); font-size: 26px; font-weight: 600;
  letter-spacing: -0.02em;
}
.att-summary-value span { color: var(--orange); font-size: 16px; }

/* Attendance table */
.att-table-wrap {
  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
  overflow-x: auto;
}
.att-table { width: 100%; border-collapse: collapse; min-width: 600px; }
.att-table th {
  background: var(--bg-soft);
  text-align: center;
  font-family: var(--font-num); font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gray-dark); font-weight: 600;
  padding: 10px 8px;
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0;
}
.att-table th:first-child { text-align: left; padding-left: 14px; }
.att-table td {
  padding: 8px; border-bottom: 1px solid var(--line);
  font-size: 13px; text-align: center;
  vertical-align: middle;
}
.att-table td:first-child { text-align: left; padding-left: 14px; }
.att-table tr:last-child td { border-bottom: 0; }
.att-table tr:hover td { background: var(--bg-soft); }

.att-cell {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px; height: 26px; border-radius: 6px;
  font-family: var(--font-num); font-size: 12px; font-weight: 600;
  line-height: 1;
  cursor: pointer;
  transition: transform .12s, box-shadow .12s;
  position: relative;
  vertical-align: middle;
}
.att-cell:hover {
  transform: scale(1.15);
  box-shadow: 0 4px 10px rgba(23,21,15,.18);
  z-index: 2;
}
.att-cell.present { background: var(--success); color: var(--bg); }
.att-cell.late    { background: var(--orange);  color: var(--bg); }
.att-cell.absent  { background: var(--danger);  color: var(--bg); }
.att-cell.holiday { background: var(--bg-canvas); color: var(--gray-soft); }
.att-cell.pending { background: transparent; color: var(--gray-soft); border: 1px dashed var(--line); }
.att-cell.leave   { background: #2B6CB0; color: var(--bg); }

/* Tooltip on hover — shows check-in time */
.att-cell::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--black);
  color: var(--bg);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-thai);
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
  z-index: 100;
  box-shadow: 0 4px 12px rgba(23,21,15,.25);
}
.att-cell::before {
  content: '';
  position: absolute;
  bottom: calc(100% + 2px);
  left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: var(--black);
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
  z-index: 100;
}
.att-cell:hover::after,
.att-cell:hover::before {
  opacity: 1;
}

.att-rate {
  font-family: var(--font-num); font-weight: 600;
}
.att-rate.good { color: var(--success); }
.att-rate.warn { color: var(--orange); }
.att-rate.bad  { color: var(--danger); }

.att-student-name { font-weight: 500; }
.att-student-meta { font-size: 11px; color: var(--gray-dark); margin-top: 2px; }

@media (max-width: 900px) {
  .kiosk__body { grid-template-columns: 1fr; }
  .kiosk__right-body { max-height: 300px; }
  .att-summary-grid { grid-template-columns: repeat(2, 1fr); }
  .att-summary-cell:nth-child(2) { border-right: 0; }
  .att-summary-cell:nth-child(1), .att-summary-cell:nth-child(2) {
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
}
@media (max-width: 480px) {
  .kiosk__pin-dot { width: 40px; height: 54px; font-size: 22px; }
  .kiosk__keypad button { padding: 18px 0; font-size: 22px; }
  .kiosk__progress { grid-template-columns: repeat(2, 1fr); }
  .kiosk__stat:nth-child(2) { border-right: 0; }
  .kiosk__stat:nth-child(1), .kiosk__stat:nth-child(2) { border-bottom: 1px solid var(--line); }
}
</style>
</head>

/* ===========================================================
   HELPERS — Date formatting (Thai Buddhist calendar)
   =========================================================== */
const THAI_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const THAI_DAYS = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];

function parseDate(s) {
  if (!s) return new Date();
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function dateToStr(dt) {
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,'0');
  const d = String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function thDate(s) {
  const dt = parseDate(s);
  const y = (dt.getFullYear() + 543) % 100;
  return `${dt.getDate()} ${THAI_MONTHS[dt.getMonth()]} ${String(y).padStart(2,'0')}`;
}
function thDateFull(s) {
  const dt = parseDate(s);
  const y = dt.getFullYear() + 543;
  return `${dt.getDate()} ${THAI_MONTHS[dt.getMonth()]} ${y}`;
}
function thDayName(s) {
  return THAI_DAYS[parseDate(s).getDay()];
}
function todayStr() {
  return dateToStr(state.today);
}
function addDays(dateStr, n) {
  const dt = parseDate(dateStr);
  dt.setDate(dt.getDate() + n);
  return dateToStr(dt);
}
function uid(prefix) {
  return (prefix || 'id') + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

/* ===========================================================
   SESSION SCHEDULER — สร้าง/อัปเดตคาบเรียน
   =========================================================== */
function ensureSessions(group) {
  if (!group.sessions) group.sessions = [];
  if (group.sessions.length === 0 && group.sessionsTotal > 0) {
    for (let i = 0; i < group.sessionsTotal; i++) {
      const dateStr = addDays(group.startDate, i * 7);
      group.sessions.push({
        no: i + 1,
        date: dateStr,
        customTime: null, // null = ใช้เวลาของกลุ่ม
        status: 'upcoming', // done | current | upcoming | holiday
        note: ''
      });
    }
  }
  // ตัด/เพิ่มให้ตรง sessionsTotal
  while (group.sessions.length < group.sessionsTotal) {
    const last = group.sessions[group.sessions.length - 1];
    const newDate = last ? addDays(last.date, 7) : group.startDate;
    group.sessions.push({
      no: group.sessions.length + 1,
      date: newDate,
      customTime: null,
      status: 'upcoming',
      note: ''
    });
  }
  while (group.sessions.length > group.sessionsTotal) {
    group.sessions.pop();
  }
  // renumber
  group.sessions.forEach((s, i) => s.no = i + 1);
  // คำนวณ endDate
  if (group.sessions.length > 0) {
    group.endDate = group.sessions[group.sessions.length - 1].date;
  }
}

function getGroupStatus(group) {
  const today = todayStr();
  ensureSessions(group);
  const start = group.startDate;
  const end = group.endDate || start;
  if (today < start) return 'upcoming';
  if (today > end) {
    // ตรวจดูว่ายังมีคาบ upcoming อยู่ไหม (กรณีเลื่อนวันหยุด)
    const hasUpcoming = group.sessions.some(s => s.status !== 'holiday' && s.status !== 'done' && s.date >= today);
    return hasUpcoming ? 'current' : 'done';
  }
  return 'current';
}

function getSessionTime(session, group) {
  if (session.customTime) return session.customTime;
  return `${group.startTime}–${group.endTime} น.`;
}

/* ===========================================================
   HOLIDAY LOGIC — เลื่อนคาบถัดไป +7 วันอัตโนมัติ
   =========================================================== */
function markHoliday(groupId, sessionNo, note) {
  const g = state.data.groups.find(x => x.id === groupId);
  if (!g) return;
  ensureSessions(g);
  const idx = g.sessions.findIndex(s => s.no === sessionNo);
  if (idx === -1) return;

  // ทำเครื่องหมายคาบนี้เป็น holiday
  g.sessions[idx].status = 'holiday';
  g.sessions[idx].note = note || 'หยุด';

  // เลื่อนคาบถัดไปทั้งหมด +7 วัน (ยกเว้นคาบที่เป็น holiday อยู่แล้ว)
  for (let i = idx + 1; i < g.sessions.length; i++) {
    if (g.sessions[i].status !== 'holiday') {
      g.sessions[i].date = addDays(g.sessions[i].date, 7);
    }
  }
  // อัปเดต endDate
  g.endDate = g.sessions[g.sessions.length - 1].date;
  saveData();
  toast(`บันทึกวันหยุด คาบที่ ${sessionNo} · เลื่อนคาบถัดไป +7 วัน`, 'success');
}

function unmarkHoliday(groupId, sessionNo) {
  const g = state.data.groups.find(x => x.id === groupId);
  if (!g) return;
  ensureSessions(g);
  const idx = g.sessions.findIndex(s => s.no === sessionNo);
  if (idx === -1) return;

  // ยกเลิก holiday
  g.sessions[idx].status = 'upcoming';
  g.sessions[idx].note = '';

  // เลื่อนคาบถัดไปกลับ -7 วัน (ยกเว้นคาบที่เป็น holiday อยู่)
  for (let i = idx + 1; i < g.sessions.length; i++) {
    if (g.sessions[i].status !== 'holiday') {
      g.sessions[i].date = addDays(g.sessions[i].date, -7);
    }
  }
  g.endDate = g.sessions[g.sessions.length - 1].date;
  saveData();
  toast(`ยกเลิกวันหยุด คาบที่ ${sessionNo} · เลื่อนคาบถัดไปกลับ -7 วัน`, 'success');
}

/* ===========================================================
   LOGIN — PIN + ล็อค 5 ครั้งผิด
   =========================================================== */
function getLock() {
  try {
    const raw = localStorage.getItem(LOCK_KEY);
    return raw ? JSON.parse(raw) : { attempts: 0, lockedUntil: 0 };
  } catch(e) {
    return { attempts: 0, lockedUntil: 0 };
  }
}
function setLock(lock) {
  localStorage.setItem(LOCK_KEY, JSON.stringify(lock));
}
function getPin() {
  return localStorage.getItem(PIN_KEY) || DEFAULT_PIN;
}
function setPin(pin) {
  localStorage.setItem(PIN_KEY, pin);
}

function tryLogin(pin) {
  const lock = getLock();
  const now = Date.now();
  if (lock.lockedUntil > now) {
    const mins = Math.ceil((lock.lockedUntil - now) / 60000);
    showLoginWarn(`ระบบล็อค กรุณารอ ${mins} นาที`);
    return false;
  }
  if (pin === getPin()) {
    setLock({ attempts: 0, lockedUntil: 0 });
    sessionStorage.setItem(SESSION_KEY, '1');
    showApp();
    return true;
  } else {
    lock.attempts++;
    if (lock.attempts >= MAX_ATTEMPTS) {
      lock.lockedUntil = now + LOCK_MINUTES * 60000;
      lock.attempts = 0;
      setLock(lock);
      showLoginWarn(`กรอกผิด 5 ครั้ง → ล็อค ${LOCK_MINUTES} นาที`);
      shakePin();
    } else {
      setLock(lock);
      const left = MAX_ATTEMPTS - lock.attempts;
      showLoginWarn(`PIN ไม่ถูกต้อง · เหลือ ${left} ครั้ง`);
      shakePin();
    }
    return false;
  }
}

function showLoginWarn(msg) {
  const el = document.getElementById('loginWarn');
  el.textContent = msg;
  el.classList.add('show');
}
function shakePin() {
  document.querySelectorAll('.pin-dot').forEach(d => {
    d.classList.add('error');
    setTimeout(() => d.classList.remove('error'), 400);
  });
}

function renderPinDisplay() {
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((d, i) => {
    if (i < state.pin.length) {
      d.textContent = state.pin[i];
      d.classList.add('filled');
    } else {
      d.textContent = '';
      d.classList.remove('filled');
    }
  });
}

function handleKeypad(key) {
  if (key === 'clear') {
    state.pin = '';
  } else if (key === 'back') {
    state.pin = state.pin.slice(0, -1);
  } else if (state.pin.length < 6) {
    state.pin += key;
    if (state.pin.length === 6) {
      setTimeout(() => {
        const ok = tryLogin(state.pin);
        if (!ok) state.pin = '';
        renderPinDisplay();
      }, 150);
    }
  }
  renderPinDisplay();
}

function showApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').style.display = 'grid';
  state.data = loadData();
  // สร้าง sessions ให้ครบทุกกลุ่ม
  state.data.groups.forEach(g => ensureSessions(g));
  saveData();
  // โหลด last sync time
  try {
    state.lastSync = localStorage.getItem('mathsBankLastSync') || null;
  } catch(e) { state.lastSync = null; }
  updateSyncIndicator();
  // เลือกกลุ่มแรกอัตโนมัติ
  if (state.data.groups.length > 0) {
    state.selectedGroupId = state.data.groups[0].id;
  }
  renderAll();
}

function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  state.pin = '';
  renderPinDisplay();
  document.getElementById('loginWarn').classList.remove('show');
  document.getElementById('appView').style.display = 'none';
  document.getElementById('loginView').style.display = 'grid';
}

   =========================================================== */

/* Convert "16.30" → minutes from midnight (990) */
function timeStrToMinutes(t) {
  if (!t) return 0;
  const parts = String(t).split('.');
  const h = parseInt(parts[0]) || 0;
  const m = parseInt(parts[1] || '0') || 0;
  return h * 60 + m;
}
function minutesToTimeStr(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${String(h).padStart(2,'0')}.${String(m).padStart(2,'0')}`;
}
function nowTimeStr() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}.${String(d.getMinutes()).padStart(2,'0')}`;
}
function nowTimestamp() {
  return new Date().toISOString();
}

/* Get or create attendance record for a session */
function getAttendance(groupId, sessionNo) {
  const g = state.data.groups.find(x => x.id === groupId);
  if (!g) return null;
  ensureSessions(g);
  const session = (g.sessions || []).find(s => s.no === sessionNo);
  if (!session) return null;
  if (!session.attendance) {
    session.attendance = {
      startedAt: null,
      finishedAt: null,
      records: {} // {studentId: {status, checkInTime, note}}
    };
    // pre-fill all students as 'pending'
    g.students.forEach(s => {
      session.attendance.records[s.id] = { status: 'pending', checkInTime: null, note: '' };
    });
  }
  return session.attendance;
}

/* เวลาเริ่มจริงของคาบ — ใช้ customTime ของคาบก่อน ถ้าไม่มีใช้เวลากลุ่ม */
function sessionStartTimeStr(session, group) {
  if (session && session.customTime) {
    const m = String(session.customTime).match(/(\d{1,2})[.:](\d{2})/);
    if (m) return m[1] + '.' + m[2];
  }
  return group.startTime;
}

/* Calculate status based on check-in time vs session start */
function calcStatusFromTime(checkInTime, group, session) {
  if (!checkInTime) return 'pending';
  const sessionStart = timeStrToMinutes(sessionStartTimeStr(session, group));
  const diff = timeStrToMinutes(checkInTime) - sessionStart;
  return diff <= ATTENDANCE_CONFIG.lateThresholdMinutes ? 'present' : 'late';
}

/* Find student by PIN — ใช้ custom PIN ถ้ามี, ถ้าไม่มีใช้ generated PIN */
function findStudentByPin(groupId, pin) {
  const g = state.data.groups.find(x => x.id === groupId);
  if (!g) return null;
  for (const s of g.students) {
    const studentPin = getStudentPin(s);
    if (studentPin === pin) return s;
  }
  return null;
}

/* Get student PIN — ถ้าครูตั้งเองใช้ของครู, ถ้าไม่ใช้ generated */
function getStudentPin(student) {
  if (student.customPin && /^\d{6}$/.test(student.customPin)) return student.customPin;
  return generateStudentPin(student.id);
}

/* Set custom PIN for student — ครูตั้งเอง */
function setStudentPin(groupId, studentId, newPin) {
  const g = state.data.groups.find(x => x.id === groupId);
  if (!g) return false;
  const s = g.students.find(x => x.id === studentId);
  if (!s) return false;
  // ตรวจ PIN 6 หลัก
  if (!/^\d{6}$/.test(newPin)) {
    toast('PIN ต้องเป็นตัวเลข 6 หลัก', 'error');
    return false;
  }
  // ตรวตไม่ให้ซ้ำกับคนอื่นในกลุ่ม
  for (const other of g.students) {
    if (other.id !== studentId && getStudentPin(other) === newPin) {
      toast(`PIN ซ้ำกับ "${other.name}" — กรุณาใช้ PIN อื่น`, 'error');
      return false;
    }
  }
  s.customPin = newPin;
  saveData();
  autoSync();
  toast(`ตั้ง PIN ของ "${s.name}" เป็น ${newPin} แล้ว`, 'success');
  return true;
}

/* Generate demo PIN for student — based on student.id hash (default) */
function generateStudentPin(studentId) {
  // แปลง student.id เป็นเลข 6 หลัก
  let hash = 0;
  for (let i = 0; i < studentId.length; i++) {
    hash = (hash * 31 + studentId.charCodeAt(i)) & 0xFFFFFFFF;
  }
  // ทำให้เป็น 6 หลัก
  const pin = (Math.abs(hash) % 1000000).toString().padStart(6, '0');
  return pin;
}

        const newPin = document.getElementById('newStudentPin').value;
        if (setStudentPin(groupId, studentId, newPin)) {
          closeModal();
          renderMain();
        }
      }}
    ]
  });
}


/* KIOSK — Start check-in session */
function startKiosk(groupId, sessionNo) {
  state.kiosk.groupId = groupId;
  state.kiosk.sessionNo = sessionNo;
  state.kiosk.pin = '';
  state.kiosk.lastResult = null;
  state.kiosk.startedAt = nowTimestamp();

  const att = getAttendance(groupId, sessionNo);
  if (!att.startedAt) {
    att.startedAt = nowTimestamp();
    saveData();
  }

  state.view = 'kiosk';
  renderAll();
}

/* KIOSK — Handle PIN entry */
function handleKioskKeypad(key) {
  if (key === 'clear') {
    state.kiosk.pin = '';
  } else if (key === 'back') {
    state.kiosk.pin = state.kiosk.pin.slice(0, -1);
  } else if (state.kiosk.pin.length < 6) {
    state.kiosk.pin += key;
    if (state.kiosk.pin.length === 6) {
      setTimeout(() => processKioskCheckin(), 200);
    }
  }
  renderKioskPin();
}

function processKioskCheckin() {
  const pin = state.kiosk.pin;
  const groupId = state.kiosk.groupId;
  const sessionNo = state.kiosk.sessionNo;
  const g = state.data.groups.find(x => x.id === groupId);
  if (!g) return;

  const student = findStudentByPin(groupId, pin);
  if (!student) {
    state.kiosk.lastResult = { type: 'error', message: 'PIN ไม่ถูกต้อง' };
    showKioskResult('error', 'ไม่พบนักเรียน', 'PIN ไม่ถูกต้อง ลองใหม่อีกครั้ง');
    setTimeout(() => {
      state.kiosk.pin = '';
      state.kiosk.lastResult = null;
      renderKioskPin();
      renderKioskList();
    }, 1500);
    return;
  }

  // Already checked in?
  const att = getAttendance(groupId, sessionNo);
  const existing = att.records[student.id];
  if (existing && existing.status !== 'pending') {
    state.kiosk.lastResult = { type: 'error', message: `${student.name} เช็คชื่อแล้ว (${statusLabel(existing.status)})` };
    showKioskResult('error', student.name, `เช็คชื่อแล้วเมื่อ ${existing.checkInTime || ''} · ${statusLabel(existing.status)}`);
    setTimeout(() => {
      state.kiosk.pin = '';
      state.kiosk.lastResult = null;
      renderKioskPin();
    }, 2000);
    return;
  }

  // Calculate status from current time vs session start
  const checkInTime = nowTimeStr();
  const kioskSession = (g.sessions || []).find(s => s.no === sessionNo);
  const status = calcStatusFromTime(checkInTime, g, kioskSession);

  att.records[student.id] = {
    status: status,
    checkInTime: checkInTime,
    note: ''
  };
  att.finishedAt = att.finishedAt || null;
  saveData();
  autoSync(); // ← Auto-sync ขึ้น Sheet

  const msg = status === 'present'
    ? `ตรงเวลา · ${checkInTime} น.`
    : `สาย · ${checkInTime} น. · +${timeStrToMinutes(checkInTime) - timeStrToMinutes(sessionStartTimeStr(kioskSession, g))} นาที`;

  state.kiosk.lastResult = { type: status, message: msg, studentName: student.name };
  showKioskResult(status, student.name, msg);

  setTimeout(() => {
    state.kiosk.pin = '';
    state.kiosk.lastResult = null;
    renderKioskPin();
    renderKioskList();
    renderKioskStats();
  }, 1500);
}

function statusLabel(s) {
  return s === 'present' ? 'ตรงเวลา' : s === 'late' ? 'สาย' : s === 'absent' ? 'ขาด' : s === 'leave' ? 'ลา' : s === 'holiday' ? 'หยุด' : 'รอเช็คชื่อ';
}

function showKioskResult(type, name, msg) {
  const nameEl = document.getElementById('kioskStudentName');
  const statusEl = document.getElementById('kioskStudentStatus');
  if (!nameEl || !statusEl) return;
  nameEl.textContent = name;
  statusEl.className = 'kiosk__student-status ' + (type === 'present' ? 'ok' : type === 'late' ? 'late' : 'error');
  statusEl.textContent = msg;

  // Color the PIN dots
  const dots = document.querySelectorAll('.kiosk__pin-dot');
  dots.forEach(d => {
    d.classList.remove('filled', 'success', 'error');
    d.classList.add(type === 'present' || type === 'late' ? 'success' : 'error');
  });
}

function renderKioskPin() {
  const dots = document.querySelectorAll('.kiosk__pin-dot');
  dots.forEach((d, i) => {
    d.classList.remove('success', 'error');
    if (i < state.kiosk.pin.length) {
      d.textContent = '•';  // ซ่อน PIN — กันคนต่อคิวมองเห็น
      d.classList.add('filled');
    } else {
      d.textContent = '';
      d.classList.remove('filled');
    }
  });

  // Reset student name/status if no result
  if (!state.kiosk.lastResult) {
    const nameEl = document.getElementById('kioskStudentName');
    const statusEl = document.getElementById('kioskStudentStatus');
    if (nameEl) nameEl.textContent = '';
    if (statusEl) {
      statusEl.className = 'kiosk__student-status';
      statusEl.textContent = state.kiosk.pin.length === 0 ? 'กรอก PIN 6 หลักเพื่อเช็คชื่อ' : 'กำลังพิมพ์...';
    }
  }
}

function renderKioskList() {
  const body = document.getElementById('kioskListBody');
  if (!body) return;
  const g = state.data.groups.find(x => x.id === state.kiosk.groupId);
  if (!g) return;
  const att = getAttendance(state.kiosk.groupId, state.kiosk.sessionNo);

  body.innerHTML = g.students.map((s, i) => {
    const r = att.records[s.id] || { status: 'pending' };
    return `
      <div class="checkin-row is-${r.status}">
        <span class="checkin-row__num">${String(i+1).padStart(2,'0')}</span>
        <span class="checkin-row__name">${s.name}</span>
        ${r.checkInTime ? `<span class="checkin-row__time">${r.checkInTime}</span>` : ''}
        <span class="checkin-row__badge ${r.status}">${statusLabel(r.status)}</span>
      </div>
    `;
  }).join('');
}

function renderKioskStats() {
  const g = state.data.groups.find(x => x.id === state.kiosk.groupId);
  if (!g) return;
  const att = getAttendance(state.kiosk.groupId, state.kiosk.sessionNo);
  let present = 0, late = 0, absent = 0, leave = 0, pending = 0;
  g.students.forEach(s => {
    const r = att.records[s.id];
    if (!r || r.status === 'pending') pending++;
    else if (r.status === 'present') present++;
    else if (r.status === 'late') late++;
    else if (r.status === 'absent') absent++;
    else if (r.status === 'leave') leave++;
  });
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('kioskStatPresent', present);
  set('kioskStatLate', late);
  set('kioskStatAbsent', absent);
  set('kioskStatLeave', leave);
  set('kioskStatPending', pending);
}

/* KIOSK — Finish session (auto-mark absent) */
function finishKiosk() {
  stopFaceScan();
  const g = state.data.groups.find(x => x.id === state.kiosk.groupId);
  if (!g) return;
  const att = getAttendance(state.kiosk.groupId, state.kiosk.sessionNo);
  let markedAbsent = 0;
  g.students.forEach(s => {
    const r = att.records[s.id];
    if (!r || r.status === 'pending') {
      att.records[s.id] = { status: 'absent', checkInTime: null, note: 'ไม่มาเรียน' };
      markedAbsent++;
    }
  });
  att.finishedAt = nowTimestamp();
  // Mark session as done
  const session = (g.sessions || []).find(s => s.no === state.kiosk.sessionNo);
  if (session) session.status = 'done';
  saveData();
  autoSync(); // ← Auto-sync ขึ้น Sheet
  toast(`จบคาบเรียน · บันทึกขาด ${markedAbsent} คน อัตโนมัติ`, 'success');
  state.view = 'attendance';
  renderAll();
}

/* KIOSK — Manual override (teacher clicks student to change status) */
function kioskManualOverride(studentId, newStatus, note) {
  const att = getAttendance(state.kiosk.groupId, state.kiosk.sessionNo);
  if (!att) return;
  const r = att.records[studentId];
  if (!r) return;
  r.status = newStatus;
  r.checkInTime = (newStatus === 'absent' || newStatus === 'leave') ? null : nowTimeStr();
  r.note = note || 'ครูแก้ไข';
  saveData();
  autoSync(); // ← Auto-sync ขึ้น Sheet
  renderKioskList();
  renderKioskStats();
  toast(`แก้เป็น ${statusLabel(newStatus)} แล้ว`, 'success');
}

/* ATTENDANCE SUMMARY — สรุปการเข้าเรียนทั้งคอร์ส */
function renderAttendanceSummary(body) {
  if (state.data.groups.length === 0) {
    body.innerHTML = `<div class="empty"><h3>ยังไม่มีกลุ่ม</h3><p>เพิ่มกลุ่มก่อนเริ่มเช็คชื่อ</p></div>`;
    return;
  }

  // ถ้ายังไม่ได้เลือกกลุ่ม → เลือกอันแรก
  if (!state.selectedGroupId) state.selectedGroupId = state.data.groups[0].id;
  const g = state.data.groups.find(x => x.id === state.selectedGroupId);
  if (!g) return;
  ensureSessions(g);

  // ตารางสรุป attendance: rows = นักเรียน, cols = คาบ
  let totalPresent = 0, totalLate = 0, totalAbsent = 0, totalLeave = 0, totalSessions = 0;
  const sessionCols = (g.sessions || []).filter(s => s.status !== 'holiday');
  totalSessions = sessionCols.length;

  // Build table
  let tableRows = g.students.map((s, idx) => {
    let present = 0, late = 0, absent = 0, leave = 0;
    const cells = sessionCols.map(sess => {
      const att = sess.attendance;
      const r = att && att.records[s.id];
      let cellStatus = 'pending';
      if (r) cellStatus = r.status;
      if (cellStatus === 'present') present++;
      else if (cellStatus === 'late') late++;
      else if (cellStatus === 'absent') absent++;
      else if (cellStatus === 'leave') leave++;
      const label = cellStatus === 'present' ? 'P' : cellStatus === 'late' ? 'L' : cellStatus === 'absent' ? 'A' : cellStatus === 'leave' ? 'S' : '-';

      // Build tooltip text
      let tip = '';
      if (cellStatus === 'present') {
        tip = `${s.name} · ตรงเวลา · ${r.checkInTime ? 'เช็ค ' + r.checkInTime + ' น.' : ''}`;
      } else if (cellStatus === 'late') {
        const lateMin = r.checkInTime ? (timeStrToMinutes(r.checkInTime) - timeStrToMinutes(sessionStartTimeStr(sess, g))) : 0;
        tip = `${s.name} · สาย ${lateMin} นาที · เช็ค ${r.checkInTime || '-'} น.`;
      } else if (cellStatus === 'absent') {
        tip = `${s.name} · ขาด${r.note ? ' · ' + r.note : ''}`;
      } else if (cellStatus === 'leave') {
        tip = `${s.name} · ลา${r.note ? ' · ' + r.note : ''}`;
      } else {
        tip = `${s.name} · ยังไม่เช็คชื่อ`;
      }

      return `<td><span class="att-cell ${cellStatus}" data-tip="${tip.replace(/"/g, '&quot;')}" onclick="showAttendanceDetail('${g.id}', ${sess.no}, '${s.id}')" title="${statusLabel(cellStatus)}">${label}</span></td>`;
    }).join('');

    const checkedIn = present + late;
    const denom = totalSessions - leave;
    const rate = denom > 0 ? Math.round(checkedIn / denom * 100) : 0;
    const rateClass = rate >= 80 ? 'good' : rate >= 60 ? 'warn' : 'bad';

    totalPresent += present;
    totalLate += late;
    totalAbsent += absent;
    totalLeave += leave;

    return `
      <tr>
        <td>
          <div class="att-student-name">${idx+1}. ${s.name}</div>

        </td>
        ${cells}
        <td><span class="att-rate ${rateClass}">${rate}%</span></td>
      </tr>
    `;
  }).join('');

  const overallDenom = totalSessions * g.students.length - totalLeave;
  const overallRate = overallDenom > 0
    ? Math.round((totalPresent + totalLate) / overallDenom * 100)
    : 0;

  body.innerHTML = `

          ${state.data.groups.map(x => `<option value="${x.id}" ${x.id === state.selectedGroupId ? 'selected' : ''}>${x.name}</option>`).join('')}
        </select>
        <div style="margin-left:auto; display:flex; gap:6px; flex-wrap:wrap;">

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            เช็คชื่อที่จอครู
          </button>
          <button class="btn btn--ghost btn--sm" onclick="showStartOnlineCheckinModal()" style="background: var(--orange); color: var(--bg); border-color: var(--orange);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>

/* Start online check-in — call server to create code */
async function startOnlineCheckin(groupId, sessionNo) {
  toast('กำลังสร้างรหัสเช็คชื่อ...', 'success');
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'startCheckin', token: TEACHER_TOKEN, groupId: groupId, sessionNo: sessionNo })
    });
    const result = await res.json();
    if (result.ok) {
      state.onlineCheckin.code = result.checkinCode;
      state.onlineCheckin.session = result.session;
      state.onlineCheckin.expiresAt = result.expiresAt;
      state.view = 'onlineCheckin';
      renderMain();
      startOnlineCheckinPolling();
      toast(`เริ่มเช็คชื่อแล้ว · รหัส: ${result.checkinCode}`, 'success');
    } else {
      toast('เริ่มไม่สำเร็จ: ' + (result.error || 'unknown'), 'error');
    }
  } catch(e) {
    toast('เชื่อมต่อไม่ได้: ' + e.message, 'error');
  }
}

/* Polling — ดึงรายชื่อคนเช็คชื่อแล้วทุก 3 วินาที */
function startOnlineCheckinPolling() {
  if (state.onlineCheckin.pollTimer) clearInterval(state.onlineCheckin.pollTimer);
  state.onlineCheckin.pollTimer = setInterval(() => pollOnlineCheckin(), 3000);
  pollOnlineCheckin(); // ทันที
}

async function pollOnlineCheckin() {
  if (state.view !== 'onlineCheckin' || !state.onlineCheckin.code) {
    clearInterval(state.onlineCheckin.pollTimer);
    return;
  }
  try {
    const url = `${SCRIPT_URL}?action=getCheckinUpdates&code=${state.onlineCheckin.code}&t=${Date.now()}`;
    const res = await fetch(url);
    const result = await res.json();
    if (result.ok) {
      updateOnlineCheckinDisplay(result);
    } else if (result.error && result.error.includes('หมดอายุ')) {
      clearInterval(state.onlineCheckin.pollTimer);
      toast('รหัสเช็คชื่อหมดอายุแล้ว', 'error');
      state.view = 'attendance';
      renderAll();
    }
  } catch(e) {
    console.error('Poll error:', e);
  }
}

function switchCheckinMethod(method) {

}

function generateQRCode(url) {
  const container = document.getElementById('qrCodeContainer');
  if (!container) return;
  container.innerHTML = '';
  if (typeof QRCode === 'undefined') {
    container.innerHTML = `<div style="color:var(--gray-soft); font-size:12px; padding:20px;">QR library ไม่พร้อมใช้งาน — ใช้ URL หรือรหัส 6 หลักแทน</div>`;
    return;
  }
  try {
    new QRCode(container, {
      text: url,
      width: 220,
      height: 220,
      colorDark: '#17150F',
      colorLight: '#FCFBF9',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    container.innerHTML = `<div style="color:var(--gray-soft); font-size:12px; padding:20px;">QR Error: ${e.message}</div>`;
  }
}

function copyCheckinUrl(url) {
  navigator.clipboard.writeText(url).then(() => {
    toast('คัดลอก URL แล้ว · ไปวางใน LINE ได้', 'success');
  }).catch(() => {
    toast('คัดลอกไม่สำเร็จ — คัดลอกเอง: ' + url, 'error');
  });
}

/* Download QR Code as PNG image */
function downloadQRCode(code, groupName, sessionNo) {
  const container = document.getElementById('qrCodeContainer');
  if (!container) return;
  const canvas = container.querySelector('canvas');
  const img = container.querySelector('img');
  if (!canvas && !img) {
    toast('ไม่พบ QR Code — ลองอีกครั้ง', 'error');
    return;
  }

  // สร้าง canvas ใหม่ที่มีพื้นหลังขาว + padding + ข้อความ
  const size = 320;
  const padding = 40;
  const headerH = 80;
  const footerH = 60;
  const totalH = size + padding * 2 + headerH + footerH;
  const totalW = size + padding * 2;

  const outCanvas = document.createElement('canvas');
  outCanvas.width = totalW;
  outCanvas.height = totalH;
  const ctx = outCanvas.getContext('2d');

  // พื้นหลังขาว
  ctx.fillStyle = '#FCFBF9';
  ctx.fillRect(0, 0, totalW, totalH);

  // Header — ชื่อกลุ่ม + คาบ
  ctx.fillStyle = '#17150F';
  ctx.font = 'bold 18px Anuphan, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(groupName, totalW / 2, 35);
  ctx.font = '14px Anuphan, sans-serif';
  ctx.fillStyle = '#6B675E';
  ctx.fillText('คาบที่ ' + sessionNo + ' · รหัสเช็คชื่อ ' + code, totalW / 2, 60);

  // QR Code
  let qrSource = canvas;
  if (!qrSource && img) {
    // กรณี library สร้างเป็น img แทน canvas
    qrSource = document.createElement('canvas');
    qrSource.width = img.naturalWidth || 220;
    qrSource.height = img.naturalHeight || 220;
    qrSource.getContext('2d').drawImage(img, 0, 0);
  }
  if (qrSource) {
    ctx.drawImage(qrSource, padding, headerH + 10, size, size);
  }

  // Footer — คำสั่ง
  ctx.fillStyle = '#E8571F';
  ctx.font = 'bold 13px Anuphan, sans-serif';
  ctx.fillText('📷 สแกน QR นี้ด้วยกล้องมือถือ → ใส่ PIN', totalW / 2, totalH - 30);

  // Download
  const link = document.createElement('a');
  link.download = `QR-เช็คชื่อ-${groupName}-คาบ${sessionNo}-${code}.png`;
  link.href = outCanvas.toDataURL('image/png');
  link.click();
  toast('ดาวน์โหลด QR แล้ว · แชร์ใน LINE ได้', 'success');
}

/* Print QR Code on A4 paper (สำหรับแปะบนกระดาน) */
function printQRCode(code, groupName, sessionNo, sessionDate, startTime, endTime) {
  const checkinUrl = window.location.href.replace(/teacher-dashboard\.html.*$/, 'checkin.html');
  const qrUrl = `${checkinUrl}?code=${code}`;

  // สร้าง QR ชั่วคราวใน div hidden เพื่อ render สำหรับ print
  const tempDiv = document.createElement('div');

function updateOnlineCheckinDisplay(data) {
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('onlineStatPresent', data.counts.present);
  set('onlineStatLate', data.counts.late);
  set('onlineStatLeave', data.counts.leave || 0);
  set('onlineStatPending', data.counts.pending);
  set('onlineStatTotal', data.total);

  // Update expiry
  if (state.onlineCheckin.expiresAt) {
    const expires = new Date(state.onlineCheckin.expiresAt);
    const minsLeft = Math.max(0, Math.round((expires - new Date()) / 60000));
    set('expiryMin', minsLeft);
    const expiryEl = document.getElementById('expiryMin');
    if (expiryEl) expiryEl.style.color = minsLeft <= 5 ? 'var(--danger)' : 'var(--orange)';
  }

  // Update list — แสดง note ด้วย
  const listBody = document.getElementById('onlineListBody');
  if (!listBody) return;
  listBody.innerHTML = data.students.map(s => {
    const noteHtml = s.note && s.note !== 'เช็คออนไลน์' && s.note !== 'สาย'
      ? `<div style="font-size:11px; color:var(--gray-dark); margin-top:2px; font-style:italic; max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">"${s.note}"</div>`
      : '';
    return `
      <div class="checkin-row is-${s.status}" style="flex-wrap:wrap;">
        <span class="checkin-row__num">${String(s.no).padStart(2,'0')}</span>
        <span class="checkin-row__name">${s.name}</span>
        ${s.checkInTime ? `<span class="checkin-row__time">${s.checkInTime}</span>` : ''}
        <span class="checkin-row__badge ${s.status}">${statusLabel(s.status)}</span>
        ${noteHtml}
      </div>
    `;
  }).join('');
}

function copyCheckinInfo(url, code) {
  const text = `เช็คชื่อเข้าเรียน\nรหัส: ${code}\nลิงก์: ${url}`;
  navigator.clipboard.writeText(text).then(() => {
    toast('คัดลอกแล้ว · ไปวางใน LINE ได้', 'success');
  }).catch(() => {
    toast('คัดลอกไม่สำเร็จ — คัดลอกเอง: ' + text, 'error');
  });
}

async function endOnlineCheckin() {
  if (!state.onlineCheckin.code) return;
  showModal({
    title: 'จบคาบเช็คชื่อ?',
    body: 'ระบบจะบันทึกคนที่ยังไม่เช็คชื่อเป็น "ขาด" อัตโนมัติ และปิดรหัสเช็คชื่อนี้',
    actions: [
      { label: 'ยกเลิก', class: 'btn--ghost', onClick: closeModal },
      { label: 'จบคาบ', class: 'btn--danger', onClick: async () => {
        closeModal();
        try {
          const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'endCheckin', token: TEACHER_TOKEN, checkinCode: state.onlineCheckin.code })
          });
          const result = await res.json();
          if (result.ok) {
            clearInterval(state.onlineCheckin.pollTimer);
            state.onlineCheckin.code = null;
            state.onlineCheckin.session = null;
            toast(`จบคาบ · บันทึกขาด ${result.markedAbsent} คน · มา ${result.totalChecked} คน`, 'success');
            // reload data from sheet
            await loadFromSheet();
            state.view = 'attendance';
            renderAll();
          } else {
            toast('จบคาบไม่สำเร็จ: ' + (result.error || ''), 'error');
          }
        } catch(e) {
          toast('เชื่อมต่อไม่ได้: ' + e.message, 'error');
        }
      }}
    ]
  });
}

/* Show modal — attendance detail of a student in a session */
function showAttendanceDetail(groupId, sessionNo, studentId) {
  const g = state.data.groups.find(x => x.id === groupId);
  if (!g) return;
  ensureSessions(g);
  const session = (g.sessions || []).find(s => s.no === sessionNo);
  if (!session) return;
  const student = g.students.find(s => s.id === studentId);
  if (!student) return;

  const att = session.attendance;
  const r = att && att.records[studentId];

  // Status info
  const statusInfo = {
    present: { label: 'ตรงเวลา', color: 'var(--success)', bg: 'var(--success-bg)' },
    late:    { label: 'สาย',     color: 'var(--orange)',  bg: '#FFF6F0' },
    absent:  { label: 'ขาด',     color: 'var(--danger)',  bg: 'var(--danger-bg)' },
    leave:   { label: 'ลา',      color: '#2B6CB0',        bg: '#EAF2FB' },
    pending: { label: 'ยังไม่เช็คชื่อ', color: 'var(--gray-dark)', bg: 'var(--bg-soft)' }
  };
  const si = statusInfo[r ? r.status : 'pending'];

  // Calculate late minutes
  let lateMinutes = 0;
  let timeDiffText = '';
  if (r && r.checkInTime && r.status !== 'absent') {
    lateMinutes = timeStrToMinutes(r.checkInTime) - timeStrToMinutes(sessionStartTimeStr(session, g));
    if (lateMinutes > 0) {
      timeDiffText = `สาย ${lateMinutes} นาที`;
    } else if (lateMinutes === 0) {
      timeDiffText = 'มาตรงเวลาเป๊ะ';
    } else {
      timeDiffText = `มาก่อน ${Math.abs(lateMinutes)} นาที`;
    }
  }

  // Build history of this student across all sessions
  const historyRows = (g.sessions || [])
    .filter(s => s.status !== 'holiday')
    .map(s => {
      const a = s.attendance;
      const rec = a && a.records[studentId];
      const st = rec ? rec.status : 'pending';
      const stInfo = statusInfo[st];
      const label = st === 'present' ? 'P' : st === 'late' ? 'L' : st === 'absent' ? 'A' : st === 'leave' ? 'S' : '-';
      const time = rec && rec.checkInTime ? rec.checkInTime + ' น.' : '-';
      const note = rec && rec.note ? rec.note : '';
      const isCurrent = s.no === sessionNo;
      return `
        <tr ${isCurrent ? 'style="background: var(--bg-canvas); font-weight: 600;"' : ''}>
          <td style="text-align:center;">${s.no}</td>
          <td>${thDate(s.date)}</td>
          <td>วัน${thDayName(s.date)}</td>
          <td style="text-align:center;">
            <span class="att-cell ${st}" style="display:inline-flex;">${label}</span>
          </td>
          <td style="font-family: var(--font-num);">${time}</td>
          <td style="font-size:12px; color:var(--gray-dark);">${note}</td>
        </tr>
      `;
    }).join('');

  // Per-student summary
  let pCount = 0, lCount = 0, aCount = 0, sCount = 0;
  (g.sessions || []).forEach(s => {
    if (s.status === 'holiday') return;
    const a = s.attendance;
    const rec = a && a.records[studentId];
    if (!rec || rec.status === 'pending') return;
    if (rec.status === 'present') pCount++;
    else if (rec.status === 'late') lCount++;
    else if (rec.status === 'absent') aCount++;
    else if (rec.status === 'leave') sCount++;
  });
  const totalSess = (g.sessions || []).filter(s => s.status !== 'holiday').length;
  const rateDenom = totalSess - sCount;
  const rate = rateDenom > 0 ? Math.round((pCount + lCount) / rateDenom * 100) : 0;

  showModal({
    title: `${student.name} · คาบที่ ${sessionNo}`,
    body: `
      <div style="background:${si.bg}; border-left:4px solid ${si.color}; padding:14px 16px; border-radius:8px; margin-bottom:16px;">
        <div style="font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:${si.color}; font-family:var(--font-num); font-weight:600; margin-bottom:4px;">สถานะการเช็คชื่อ</div>
        <div style="font-size:20px; font-weight:700; color:${si.color};">${si.label}</div>
        ${r && r.checkInTime ? `<div style="margin-top:6px; font-size:14px;">เวลาที่เช็ค: <b style="font-family:var(--font-num);">${r.checkInTime} น.</b> ${timeDiffText ? '· ' + timeDiffText : ''}</div>` : ''}
        ${r && r.note ? `<div style="margin-top:4px; font-size:13px; color:var(--gray-dark);">หมายเหตุ: ${r.note}</div>` : ''}
        <div style="margin-top:8px; font-size:12px; color:var(--gray-dark);">
          คาบเรียน: ${thDateFull(session.date)} · วัน${thDayName(session.date)} · ${g.startTime}–${g.endTime} น.
        </div>
      </div>

      <div style="display:grid; grid-template-columns:repeat(5, 1fr); gap:8px; margin-bottom:16px;">
        <div style="background:var(--bg-soft); padding:10px; border-radius:8px; text-align:center;">
          <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gray-dark); font-family:var(--font-num);">มา</div>
          <div style="font-family:var(--font-num); font-size:20px; font-weight:600; color:var(--success);">${pCount}</div>
        </div>
        <div style="background:var(--bg-soft); padding:10px; border-radius:8px; text-align:center;">
          <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gray-dark); font-family:var(--font-num);">สาย</div>
          <div style="font-family:var(--font-num); font-size:20px; font-weight:600; color:var(--orange);">${lCount}</div>
        </div>
        <div style="background:var(--bg-soft); padding:10px; border-radius:8px; text-align:center;">
          <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gray-dark); font-family:var(--font-num);">ลา</div>
          <div style="font-family:var(--font-num); font-size:20px; font-weight:600; color:#2B6CB0;">${sCount}</div>
        </div>
        <div style="background:var(--bg-soft); padding:10px; border-radius:8px; text-align:center;">
          <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gray-dark); font-family:var(--font-num);">ขาด</div>
          <div style="font-family:var(--font-num); font-size:20px; font-weight:600; color:var(--danger);">${aCount}</div>
        </div>
        <div style="background:var(--bg-soft); padding:10px; border-radius:8px; text-align:center;">
          <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gray-dark); font-family:var(--font-num);">อัตรามา</div>
          <div style="font-family:var(--font-num); font-size:20px; font-weight:600;">${rate}%</div>
        </div>
      </div>

      <div style="font-family:var(--font-num); font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--gray-dark); font-weight:600; margin-bottom:8px;">ประวัติการเช็คชื่อทั้งคอร์ส</div>
      <div style="max-height:240px; overflow-y:auto; border:1px solid var(--line); border-radius:8px;">
        <table class="print-table" style="font-size:12px; width:100%; border-collapse:collapse;">

              <th style="padding:8px; background:var(--bg-soft); border-bottom:1px solid var(--line); text-align:left; font-family:var(--font-num); font-size:10px; letter-spacing:0.12em; text-transform:uppercase;">วันที่</th>
              <th style="padding:8px; background:var(--bg-soft); border-bottom:1px solid var(--line); text-align:left; font-family:var(--font-num); font-size:10px; letter-spacing:0.12em; text-transform:uppercase;">วัน</th>

/* Override attendance from detail modal */
function overrideAttendanceDetail(groupId, sessionNo, studentId, newStatus, note) {
  const g = state.data.groups.find(x => x.id === groupId);
  if (!g) return;
  const session = (g.sessions || []).find(s => s.no === sessionNo);
  if (!session) return;
  if (!session.attendance) getAttendance(groupId, sessionNo);
  const r = session.attendance.records[studentId];
  if (!r) return;
  r.status = newStatus;
  r.checkInTime = (newStatus === 'absent' || newStatus === 'leave') ? null : (r.checkInTime || nowTimeStr());
  r.note = note || 'ครูแก้ไข';
  saveData();
  autoSync();
  closeModal();
  toast(`แก้เป็น ${statusLabel(newStatus)} แล้ว`, 'success');
  renderMain();
}

/* PRINT — Attendance report A4 */
function printAttendanceReport(groupId) {
  const g = state.data.groups.find(x => x.id === groupId);
  if (!g) return;
  ensureSessions(g);

  const sessionCols = (g.sessions || []).filter(s => s.status !== 'holiday');
  const today = todayStr();

  // Per-student summary
  const studentRows = g.students.map((s, idx) => {
    let present = 0, late = 0, absent = 0, leave = 0;
    const cells = sessionCols.map(sess => {
      const att = sess.attendance;
      const r = att && att.records[s.id];
      let st = r ? r.status : 'pending';
      if (st === 'present') present++;
      else if (st === 'late') late++;
      else if (st === 'absent') absent++;
      else if (st === 'leave') leave++;
      const sym = st === 'present' ? '/' : st === 'late' ? 'ส' : st === 'absent' ? 'X' : st === 'leave' ? 'ล' : '-';

/* ===========================================================
   FACE SCAN — เช็คชื่อด้วยใบหน้า (face-api.js, รันในเบราว์เซอร์)
   ข้อมูลเก็บเป็น descriptor ตัวเลข 128 ค่า ไม่เก็บรูปภาพ
   =========================================================== */
let _faceApiPromise = null;
let _faceStream = null;      // กล้องโหมด kiosk
let _enrollStream = null;    // กล้องโหมดลงทะเบียน
let _faceScanTimer = null;
let _faceScanBusy = false;
let _faceCandidate = null;   // student ที่รอยืนยัน
let _enrollShots = [];       // descriptors ระหว่างลงทะเบียน

function loadFaceStore() {
  try { return JSON.parse(localStorage.getItem(FACE_STORE_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveFaceStore(store) {
  try { localStorage.setItem(FACE_STORE_KEY, JSON.stringify(store)); return true; }
  catch(e) { toast('บันทึกข้อมูลใบหน้าไม่สำเร็จ (พื้นที่ localStorage เต็ม?)', 'error'); return false; }
}
function hasFaceData(studentId) {
  const store = loadFaceStore();
  return !!(store[studentId] && store[studentId].length);
}

function ensureFaceApi() {
  if (_faceApiPromise) return _faceApiPromise;
  _faceApiPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = FACE_CONFIG.libUrl;
    s.onload = async () => {
      try {
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(FACE_CONFIG.modelUrl),
          faceapi.nets.faceLandmark68Net.loadFromUri(FACE_CONFIG.modelUrl),
          faceapi.nets.faceRecognitionNet.loadFromUri(FACE_CONFIG.modelUrl)
        ]);
        resolve();
      } catch(e) { _faceApiPromise = null; reject(e); }
    };
    s.onerror = () => { _faceApiPromise = null; reject(new Error('โหลด face-api.js ไม่สำเร็จ — เช็คอินเทอร์เน็ต')); };
    document.head.appendChild(s);
  });
  return _faceApiPromise;
}

async function detectDescriptor(videoEl) {
  const det = await faceapi
    .detectSingleFace(videoEl, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
    .withFaceLandmarks()
    .withFaceDescriptor();
  return det || null;
}

function euclideanDist(a, b) {
  let sum = 0;
  for (let i = 0; i < a.length; i++) { const d = a[i] - b[i]; sum += d * d; }
  return Math.sqrt(sum);
}

/* หานักเรียนในกลุ่มที่ descriptor ใกล้ที่สุด (ต้องต่ำกว่า threshold) */
function matchFace(descriptor, group) {
  const store = loadFaceStore();
  let best = null;
  group.students.forEach(s => {
    const descs = store[s.id];
    if (!descs || !descs.length) return;
    descs.forEach(d => {
      const dist = euclideanDist(descriptor, d);
      if (!best || dist < best.distance) best = { student: s, distance: dist };
    });
  });
  return (best && best.distance <= FACE_CONFIG.matchThreshold) ? best : null;
}

    `,

async function captureEnrollShot(groupId, studentId) {
  const video = document.getElementById('faceEnrollVideo');
  const st = document.getElementById('faceEnrollStatus');
  if (!video || !video.srcObject) return;
  if (st) st.textContent = 'กำลังประมวลผลภาพ...';
  let det = null;
  try { det = await detectDescriptor(video); } catch(e) { if (st) st.textContent = 'ประมวลผลไม่สำเร็จ: ' + e.message; return; }
  if (!det) { if (st) st.textContent = 'ไม่พบใบหน้าชัดๆ — ขยับเข้าใกล้ / เพิ่มแสง แล้วลองใหม่'; return; }
  _enrollShots.push(Array.from(det.descriptor).map(x => Math.round(x * 1000) / 1000));
  const n = _enrollShots.length;
  document.querySelectorAll('#modalActions button').forEach(b => {
    if (b.textContent.includes('ถ่ายภาพ')) b.textContent = `📷 ถ่ายภาพ (${n}/${FACE_CONFIG.captureCount})`;
  });
  if (n < FACE_CONFIG.captureCount) {
    if (st) st.textContent = `เก็บภาพที่ ${n} แล้ว ✓ — เปลี่ยนมุมเล็กน้อยแล้วถ่ายอีก ${FACE_CONFIG.captureCount - n} ครั้ง`;
    return;
  }
  const store = loadFaceStore();
  store[studentId] = _enrollShots.slice();
  if (!saveFaceStore(store)) return;
  const g = state.data.groups.find(x => x.id === groupId);
  const stu = g && g.students.find(x => x.id === studentId);
  stopEnrollCamera();
  closeModal();
  toast(`ลงทะเบียนใบหน้า "${stu ? stu.name : ''}" สำเร็จ`, 'success');
  renderMain();
  syncFaceToSheet(studentId, stu ? stu.name : '');
}

function stopEnrollCamera() {
  if (_enrollStream) { _enrollStream.getTracks().forEach(tr => tr.stop()); _enrollStream = null; }
  _enrollShots = [];
}

function deleteFaceData(studentId, name) {
  const store = loadFaceStore();
  delete store[studentId];
  saveFaceStore(store);
  toast(`ลบข้อมูลใบหน้า "${name}" แล้ว`, 'success');
  renderMain();

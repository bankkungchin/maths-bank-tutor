/* ===========================================================

   DESIGN SYSTEM — Maths Bank Tutor

   =========================================================== */

  --orange:       #E8571F;

* { box-sizing: border-box; margin: 0; padding: 0; }

a { color: inherit; text-decoration: none; }

button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; }

input, select { font-family: inherit; font-size: 16px; color: var(--black); }

.num { font-family: var(--font-num); font-feature-settings: 'tnum' 1, 'lnum' 1; }

 

/* ===========================================================

.wrap {

   STEP 1 — Enter check-in code

   =========================================================== */

.card {

.code-input-display {

}

.code-dot {

  width: 48px; height: 60px;

@keyframes shake {

  25% { transform: translateX(-4px); }

.keypad button {

.note-section {

/* ===========================================================

.btn {

/* ===========================================================

.app-footer {

/* ===========================================================

<script>

/* ===========================================================

   CONFIG

   =========================================================== */

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzh0M26XbDfjrVuUjUgn1Dr-Z209ms9UibPAxfd-YiB7oHnD-1ubzc3PNtadO7tULjm/exec';  // ← ใส่ URL ของ Google Apps Script ที่นี่ (เหมือน teacher-dashboard.html)

 

/* face scan (มือถือนักเรียน) — จับคู่ฝั่ง server */

const FACE_CONFIG = {

  libUrl: 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js',

  modelUrl: 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights',

  scanIntervalMs: 1200

};

 

/* ===========================================================

   STATE

   =========================================================== */

const state = {

  step: 'home',         // 'home' | 'code' | 'pin' | 'success' | 'leave_pin' | 'leave_form' | 'leave_success'

  checkinCode: '',      // 6 หลักที่ครูให้มา

  pin: '',              // PIN 6 หลักของนักเรียน

  sessionInfo: null,    // { groupId, groupName, sessionNo, sessionDate, startTime, endTime }

  studentInfo: null,    // { id, name }

  checkinResult: null,  // { status, checkInTime, lateMinutes }

  leavePin: '',

  leaveInfo: null,      // { student, group, sessions } จาก server

  leaveSel: { sessionNo: null, type: null },

  error: null

};

 

/* ===========================================================

   HELPERS

   =========================================================== */

const THAI_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

const THAI_DAYS = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];

 

function thDate(s) {

  if (!s) return '';

  const [y,m,d] = s.split('-').map(Number);

  const dt = new Date(y, m-1, d);

  const yy = (dt.getFullYear() + 543) % 100;

  return `${dt.getDate()} ${THAI_MONTHS[dt.getMonth()]} ${String(yy).padStart(2,'0')}`;

}

function thDateFull(s) {

  if (!s) return '';

  const [y,m,d] = s.split('-').map(Number);

  const dt = new Date(y, m-1, d);

  const yy = dt.getFullYear() + 543;

  return `${dt.getDate()} ${THAI_MONTHS[dt.getMonth()]} ${yy}`;

}

function nowTimeStr() {

  const d = new Date();

  return `${String(d.getHours()).padStart(2,'0')}.${String(d.getMinutes()).padStart(2,'0')}`;

}

function timeStrToMinutes(t) {

  if (!t) return 0;

  const parts = String(t).split('.');

  const h = parseInt(parts[0]) || 0;

  const m = parseInt(parts[1] || '0') || 0;

  return h * 60 + m;

}

 

/* ===========================================================

   RENDER — STEP 1: Enter check-in code

   =========================================================== */

function renderCodeStep() {

  const body = document.getElementById('appBody');

  const hasUrlCode = state.checkinCode.length === 6;

  body.innerHTML = `

    <div class="card">

      <span class="card__label">Step 1 of 2</span>

      <h2 class="card__title">กรอกรหัสคาบเรียน</h2>

      <p class="card__hint">รหัส 6 หลักที่ครูให้ไว้บนกระดาน หรือส่งใน LINE กลุ่ม</p>

 

      <div class="step-indicator">

        <span class="step-dot active"></span>

        <span class="step-dot"></span>

      </div>

 

      <div class="code-input-display" id="codeDisplay">

        <div class="code-dot"></div>

        <div class="code-dot"></div>

        <div class="code-dot"></div>

        <div class="code-dot"></div>

        <div class="code-dot"></div>

        <div class="code-dot"></div>

      </div>

 

      <div class="keypad" id="codeKeypad">

        <button data-k="1">1</button>

        <button data-k="2">2</button>

        <button data-k="3">3</button>

        <button data-k="4">4</button>

        <button data-k="5">5</button>

        <button data-k="6">6</button>

        <button data-k="7">7</button>

        <button data-k="8">8</button>

        <button data-k="9">9</button>

        <button class="clear" data-k="clear">ล้าง</button>

        <button data-k="0">0</button>

        <button class="back" data-k="back">←</button>

      </div>

 

      <div class="status-msg" id="codeStatus"></div>

 

      <div style="margin-top:20px; padding-top:16px; border-top:1px solid var(--line); text-align:center;">

        <div style="font-size:12px; color:var(--gray-dark); margin-bottom:8px;">หรือใช้วิธีอื่น:</div>

        <button class="btn btn--ghost btn--sm" style="width:100%; background: var(--bg-soft);" onclick="window.location.href='checkin.html'">

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="14" y1="14" x2="14" y2="21"/><line x1="18" y1="14" x2="21" y2="14"/><line x1="18" y1="18" x2="21" y2="18"/></svg>

          เริ่มใหม่ (ล้างรหัส)

        </button>

      </div>

 

      <div style="margin-top:12px; font-size:11px; color:var(--gray-dark); text-align:center; line-height:1.5;">

        💡 <b>ทางลัด:</b> ถ้าครูส่งลิงก์มาพร้อมรหัส (เช่น <code style="background:var(--bg-soft); padding:1px 4px; border-radius:3px; font-family:var(--font-num); font-size:10px;">checkin.html?code=384721</code>)<br>

        ระบบจะข้าม step นี้ไปใส่ PIN เลย — ไม่ต้องพิมพ์รหัสเอง

      </div>

    </div>

  `;

 

  // Wire keypad

  body.querySelectorAll('#codeKeypad button').forEach(b => {

    b.addEventListener('click', () => handleCodeKeypad(b.dataset.k));

  });

 

  renderCodeDisplay();

}

 

function renderCodeDisplay() {

  const dots = document.querySelectorAll('#codeDisplay .code-dot');

  dots.forEach((d, i) => {

    d.classList.remove('success', 'error');

    if (i < state.checkinCode.length) {

      d.textContent = state.checkinCode[i];

      d.classList.add('filled');

    } else {

      d.textContent = '';

      d.classList.remove('filled');

    }

  });

}

 

function handleCodeKeypad(key) {

  if (key === 'clear') {

    state.checkinCode = '';

  } else if (key === 'back') {

    state.checkinCode = state.checkinCode.slice(0, -1);

  } else if (state.checkinCode.length < 6) {

    state.checkinCode += key;

    if (state.checkinCode.length === 6) {

      setTimeout(() => verifyCheckinCode(), 200);

    }

  }

  renderCodeDisplay();

}

 

async function verifyCheckinCode() {

  showCodeStatus('กำลังตรวจสอบรหัส...', 'info');

 

  if (!SCRIPT_URL) {

    // Demo mode — รหัส 123456 ใช้ได้

    setTimeout(() => {

      if (state.checkinCode === '123456') {

        state.sessionInfo = {

          groupId: 'm4-wed-1630',

          groupName: 'ม.4 วันพุธ 16.30',

          sessionNo: 6,

          sessionDate: '2026-07-15',

          startTime: '16.30',

          endTime: '19.00'

        };

        showCodeStatus('รหัสถูกต้อง ✓', 'success');

        setTimeout(() => {

          state.step = 'pin';

          state.pin = '';

          renderPinStep();

        }, 800);

      } else {

        showCodeStatus('รหัสไม่ถูกต้อง หรือหมดอายุแล้ว', 'error');

        state.checkinCode = '';

        setTimeout(() => {

          renderCodeDisplay();

          hideCodeStatus();

        }, 1500);

      }

    }, 500);

    return;

  }

 

  try {

    const url = `${SCRIPT_URL}?action=lookupCheckin&code=${state.checkinCode}&t=${Date.now()}`;

    const res = await fetch(url);

    const result = await res.json();

    if (result.ok) {

      state.sessionInfo = result.session;

      showCodeStatus('รหัสถูกต้อง ✓', 'success');

      setTimeout(() => {

        state.step = 'pin';

        state.pin = '';

        renderPinStep();

      }, 800);

    } else {

      showCodeStatus(result.error || 'รหัสไม่ถูกต้อง', 'error');

      state.checkinCode = '';

      setTimeout(() => {

        renderCodeDisplay();

        hideCodeStatus();

      }, 1500);

    }

  } catch(e) {

    showCodeStatus('เชื่อมต่อไม่ได้: ' + e.message, 'error');

    state.checkinCode = '';

    setTimeout(() => {

      renderCodeDisplay();

      hideCodeStatus();

    }, 2000);

  }

}

 

function showCodeStatus(msg, type) {

  const el = document.getElementById('codeStatus');

  el.textContent = msg;

  el.className = 'status-msg show ' + type;

}

function hideCodeStatus() {

  const el = document.getElementById('codeStatus');

  el.classList.remove('show');

}

 

/* ===========================================================

   RENDER — STEP 2: Enter PIN

   =========================================================== */

function renderPinStep() {

  const body = document.getElementById('appBody');

  const s = state.sessionInfo;

  body.innerHTML = `

    <div class="card">

      <span class="card__label">Step 2 of 2</span>

      <h2 class="card__title">กรอก PIN ของคุณ</h2>

      <p class="card__hint">

        <b>${s.groupName}</b> · คาบที่ ${s.sessionNo}<br>

        ${thDateFull(s.sessionDate)} · ${s.startTime}–${s.endTime} น.

      </p>

 

      <div class="step-indicator">

        <span class="step-dot done"></span>

        <span class="step-dot active"></span>

      </div>

 

      <div class="code-input-display" id="pinDisplay">

        <div class="code-dot"></div>

        <div class="code-dot"></div>

        <div class="code-dot"></div>

        <div class="code-dot"></div>

        <div class="code-dot"></div>

        <div class="code-dot"></div>

      </div>

 

      <div class="keypad" id="pinKeypad">

        <button data-k="1">1</button>

        <button data-k="2">2</button>

        <button data-k="3">3</button>

        <button data-k="4">4</button>

        <button data-k="5">5</button>

        <button data-k="6">6</button>

        <button data-k="7">7</button>

        <button data-k="8">8</button>

        <button data-k="9">9</button>

        <button class="clear" data-k="clear">ล้าง</button>

        <button data-k="0">0</button>

        <button class="back" data-k="back">←</button>

      </div>

 

      <div class="status-msg" id="pinStatus"></div>

 

      <button class="btn btn--leave btn--sm" style="margin-top:16px; width:100%;" onclick="startFaceCheckin()">

        ← กลับไปแก้รหัสคาบ

      </button>

    </div>

  `;

 

  body.querySelectorAll('#pinKeypad button').forEach(b => {

    b.addEventListener('click', () => handlePinKeypad(b.dataset.k));

  });

  document.getElementById('backToCode').addEventListener('click', () => {

    state.step = 'code';

    state.checkinCode = '';

    state.pin = '';

    renderCodeStep();

  });

 

  renderPinDisplay();

}

 

function renderPinDisplay() {

  const dots = document.querySelectorAll('#pinDisplay .code-dot');

  dots.forEach((d, i) => {

    d.classList.remove('success', 'error');

    if (i < state.pin.length) {

      d.textContent = '•';  // ซ่อน PIN

      d.classList.add('filled');

    } else {

      d.textContent = '';

      d.classList.remove('filled');

    }

  });

}

 

function handlePinKeypad(key) {

  if (key === 'clear') {

    state.pin = '';

  } else if (key === 'back') {

    state.pin = state.pin.slice(0, -1);

  } else if (state.pin.length < 6) {

    state.pin += key;

    if (state.pin.length === 6) {

      setTimeout(() => submitCheckin(), 200);

    }

  }

  renderPinDisplay();

}

 

async function submitCheckin() {

  showPinStatus('กำลังบันทึกการเช็คชื่อ...', 'info');

 

  if (!SCRIPT_URL) {

    // Demo mode — PIN 123456 = เต้, สาย

    setTimeout(() => {

      const demoStudents = [

        { id: 's1', name: 'เต้', pin: '123456' },

        { id: 's2', name: 'ปราง', pin: '234567' },

        { id: 's3', name: 'กวิน', pin: '345678' },

        { id: 's4', name: 'เอิร์ธ', pin: '456789' },

        { id: 's5', name: 'นัน', pin: '567890' }

      ];

      const found = demoStudents.find(s => s.pin === state.pin);

      if (found) {

        const checkInTime = nowTimeStr();

        const sessionStart = timeStrToMinutes(state.sessionInfo.startTime);

        const checkIn = timeStrToMinutes(checkInTime);

        const diff = checkIn - sessionStart;

        const status = diff <= 10 ? 'present' : 'late';

        state.studentInfo = found;

        state.checkinResult = {

          status: status,

          checkInTime: checkInTime,

          lateMinutes: diff > 0 ? diff : 0

        };

        showPinStatus('บันทึกสำเร็จ ✓', 'success');

        setTimeout(() => {

          state.step = 'success';

          renderSuccessScreen();

        }, 800);

      } else {

        showPinStatus('PIN ไม่ถูกต้อง', 'error');

        state.pin = '';

        setTimeout(() => {

          renderPinDisplay();

          hidePinStatus();

        }, 1500);

      }

    }, 500);

    return;

  }

 

  try {

    const res = await fetch(SCRIPT_URL, {

      method: 'POST',

      headers: { 'Content-Type': 'text/plain;charset=utf-8' },

      body: JSON.stringify({

        action: 'submitCheckin',

        checkinCode: state.checkinCode,

        pin: state.pin

      })

    });

    const result = await res.json();

    if (result.ok) {

      state.studentInfo = result.student;

      state.checkinResult = result.checkin;

      showPinStatus('บันทึกสำเร็จ ✓', 'success');

      setTimeout(() => {

        state.step = 'success';

        renderSuccessScreen();

      }, 800);

    } else {

      showPinStatus(result.error || 'เช็คชื่อไม่สำเร็จ', 'error');

      state.pin = '';

      setTimeout(() => {

        renderPinDisplay();

        hidePinStatus();

      }, 2000);

    }

  } catch(e) {

    showPinStatus('เชื่อมต่อไม่ได้: ' + e.message, 'error');

    state.pin = '';

    setTimeout(() => {

      renderPinDisplay();

      hidePinStatus();

    }, 2000);

  }

}

 

function showPinStatus(msg, type) {

  const el = document.getElementById('pinStatus');

  el.textContent = msg;

  el.className = 'status-msg show ' + type;

}

function hidePinStatus() {

  const el = document.getElementById('pinStatus');

  el.classList.remove('show');

}

/* ===========================================================

   FACE CHECK-IN — สแกนหน้าจากมือถือนักเรียน (จับคู่ฝั่ง server)

   =========================================================== */

let _faceApiPromise = null;

let _faceStream = null;

let _faceTimer = null;

let _faceBusy = false;

let _facePending = null;   // { student, descriptor } รอนักเรียนยืนยัน

 

function ensureFaceApi() {

  if (_faceApiPromise) return _faceApiPromise;

  _faceApiPromise = new Promise((resolve, reject) => {

    const s = document.createElement('script');

    s.src = FACE_CONFIG.libUrl;

    s.onload = async () => {

      try {

        await Promise.all([

          faceapi.nets.tinyFaceDetector.loadFromUri(FACE_CONFIG.modelUrl),

          faceapi.nets.faceLandmark68Net.loadFromUri(FACE_CONFIG.modelUrl),

          faceapi.nets.faceRecognitionNet.loadFromUri(FACE_CONFIG.modelUrl)

        ]);

        resolve();

      } catch(e) { _faceApiPromise = null; reject(e); }

    };

    s.onerror = () => { _faceApiPromise = null; reject(new Error('โหลดโมเดลไม่สำเร็จ — เช็คอินเทอร์เน็ต')); };

    document.head.appendChild(s);

  });

  return _faceApiPromise;

}

 

function startFaceCheckin() {

  if (!SCRIPT_URL) {

    alert('โหมดทดลองยังไม่รองรับสแกนหน้า — ต้องเชื่อมระบบจริงก่อน');

    return;

  }

  state.step = 'face';

  renderFaceStep();

}

 

function renderFaceStep() {

  const s = state.sessionInfo;

  const body = document.getElementById('appBody');

  body.innerHTML = `

    <div class="card">

      <span class="card__label" style="color:#2B6CB0;">Face Check-in</span>

      <h2 class="card__title">สแกนหน้าเพื่อเช็คชื่อ</h2>

      <p class="card__hint"><b>${s.groupName}</b> · คาบที่ ${s.sessionNo} · ${thDateFull(s.sessionDate)}</p>

 

      <div style="position:relative; background:#000; border-radius:12px; overflow:hidden; aspect-ratio:3/4; max-width:320px; margin:0 auto;">

        <video id="faceVideo" autoplay muted playsinline style="width:100%; height:100%; object-fit:cover; transform:scaleX(-1);"></video>

      </div>

      <div id="faceStatus" style="text-align:center; margin-top:12px; font-size:13px; color:var(--gray-dark); min-height:20px;">กำลังโหลดโมเดล (ครั้งแรก ~6MB) + เปิดกล้อง...</div>

      <div id="faceConfirmBox" style="display:none; text-align:center; margin-top:12px; padding:16px; background:#EAF2FB; border-radius:12px;"></div>

 

      <button class="btn btn--ghost btn--sm" style="margin-top:16px; width:100%;" onclick="cancelFaceCheckin()">← ใช้ PIN แทน</button>

    </div>

  `;

  beginFaceScan();

}

 

async function beginFaceScan() {

  const st = () => document.getElementById('faceStatus');

  try {

    const results = await Promise.all([

      ensureFaceApi(),

      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 480 } })

    ]);

    _faceStream = results[1];

    const video = document.getElementById('faceVideo');

    if (!video) { stopFaceCheckin(); return; }

    video.srcObject = _faceStream;

    if (st()) st().textContent = 'มองกล้องตรงๆ ค้างไว้...';

    _faceTimer = setInterval(faceTick, FACE_CONFIG.scanIntervalMs);

  } catch(e) {

    if (st()) st().textContent = 'เปิดกล้องไม่สำเร็จ: ' + e.message + ' — กดปุ่มด้านล่างเพื่อใช้ PIN';

  }

}

 

async function faceTick() {

  if (_faceBusy || _facePending) return;

  const video = document.getElementById('faceVideo');

  if (!video || !video.srcObject) return;

  _faceBusy = true;

  const st = document.getElementById('faceStatus');

  try {

    const det = await faceapi

      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))

      .withFaceLandmarks()

      .withFaceDescriptor();

    if (det) {

      if (st) st.textContent = 'พบใบหน้า — กำลังจับคู่กับระบบ...';

      const descriptor = Array.from(det.descriptor).map(x => Math.round(x * 1000) / 1000);

      const res = await fetch(SCRIPT_URL, {

        method: 'POST',

        headers: { 'Content-Type': 'text/plain;charset=utf-8' },

        body: JSON.stringify({ action: 'faceCheckin', checkinCode: state.checkinCode, descriptor: descriptor })

      });

      const result = await res.json();

      if (result.ok && result.needConfirm) {

        _facePending = { student: result.student, descriptor: descriptor, confidence: result.confidence };

        showFaceConfirm();

      } else if (!result.ok) {

        if (st) st.textContent = result.error || 'จับคู่ไม่ได้ — ลองใหม่';

      }

    }

  } catch(e) {

    if (st) st.textContent = 'ผิดพลาด: ' + e.message;

  }

  _faceBusy = false;

}

 

function showFaceConfirm() {

  const box = document.getElementById('faceConfirmBox');

  const p = _facePending;

  if (!box || !p) return;

  box.style.display = '';

  box.innerHTML = `

    <div style="font-size:22px; font-weight:700;">${p.student.name}</div>

    <div style="font-size:12px; color:var(--gray-dark); margin:2px 0 12px;">ความมั่นใจ ~${p.confidence}% — ใช่คุณไหม?</div>

    <div style="display:flex; gap:8px; justify-content:center;">

      <button class="btn btn--primary btn--sm" onclick="confirmFaceIdentity()">✓ ใช่ ฉันเอง</button>

      <button class="btn btn--ghost btn--sm" onclick="rejectFaceIdentity()">ไม่ใช่</button>

    </div>

  `;

}

 

function rejectFaceIdentity() {

  _facePending = null;

  const box = document.getElementById('faceConfirmBox');

  if (box) { box.style.display = 'none'; box.innerHTML = ''; }

  const st = document.getElementById('faceStatus');

  if (st) st.textContent = 'ลองสแกนใหม่ — มองกล้องตรงๆ เพิ่มแสงหน่อย';

}

 

async function confirmFaceIdentity() {

  const p = _facePending;

  if (!p) return;

  const st = document.getElementById('faceStatus');

  if (st) st.textContent = 'กำลังบันทึกการเช็คชื่อ...';

  try {

    const res = await fetch(SCRIPT_URL, {

      method: 'POST',

      headers: { 'Content-Type': 'text/plain;charset=utf-8' },

      body: JSON.stringify({

        action: 'faceCheckin',

        checkinCode: state.checkinCode,

        descriptor: p.descriptor,

        confirmStudentId: p.student.id

      })

    });

    const result = await res.json();

    if (result.ok) {

      stopFaceCheckin();

      state.studentInfo = result.student;

      state.checkinResult = result.checkin;

      state.step = 'success';

      renderSuccessScreen();

    } else {

      _facePending = null;

      rejectFaceIdentity();

      if (st) st.textContent = result.error || 'บันทึกไม่สำเร็จ — ลองใหม่';

    }

  } catch(e) {

    if (st) st.textContent = 'เชื่อมต่อไม่ได้: ' + e.message;

  }

}

 

function stopFaceCheckin() {

  if (_faceTimer) { clearInterval(_faceTimer); _faceTimer = null; }

  if (_faceStream) { _faceStream.getTracks().forEach(tr => tr.stop()); _faceStream = null; }

  _facePending = null;

  _faceBusy = false;

}

 

function cancelFaceCheckin() {

  stopFaceCheckin();

  state.step = 'pin';

  state.pin = '';

  renderPinStep();

}

        setTimeout(() => renderLeavePinDisplay(), 1200);

      }

  try {

    const res = await fetch(SCRIPT_URL, {

      headers: { 'Content-Type': 'text/plain;charset=utf-8' },

      body: JSON.stringify({ action: 'leaveOptions', pin: state.leavePin })

    });

    const result = await res.json();

    if (result.ok) {

      state.leaveInfo = result;

      renderLeaveForm();

    } else {

      showLeavePinStatus(result.error || 'PIN ไม่ถูกต้อง', 'error');

      state.leavePin = '';

      setTimeout(() => renderLeavePinDisplay(), 1500);

    }

  } catch(e) {

    showLeavePinStatus('เชื่อมต่อไม่ได้: ' + e.message, 'error');

    state.leavePin = '';

    setTimeout(() => renderLeavePinDisplay(), 2000);

  }

}

 

function renderLeaveForm() {

  state.step = 'leave_form';

  const info = state.leaveInfo;

  const body = document.getElementById('appBody');

  const first = info.sessions[0];

  if (!state.leaveSel.sessionNo) state.leaveSel.sessionNo = first.no;

 

  const sessionsHtml = info.sessions.map(s => `

    <button class="leave-option ${state.leaveSel.sessionNo === s.no ? 'is-active' : ''}" onclick="selectLeaveSession(${s.no})">

      📅 คาบที่ ${s.no}<small style="margin-left:auto;">${thDateFull(s.date)} · วัน${THAI_DAYS[new Date(s.date.split('-')[0], s.date.split('-')[1]-1, s.date.split('-')[2]).getDay()]}</small>

    </button>

  `).join('');

 

  const types = [

    { key: 'ลาป่วย', icon: '🤒', desc: 'ไม่สบาย ไปหาหมอ ฯลฯ' },

    { key: 'ลากิจ', icon: '📌', desc: 'ธุระครอบครัว กิจกรรมโรงเรียน ฯลฯ' },

    { key: 'แจ้งสาย', icon: '⏰', desc: 'มาเรียนแต่จะถึงช้า' }

  ];

  const typesHtml = types.map(x => `

    <button class="leave-option ${state.leaveSel.type === x.key ? 'is-active' : ''}" onclick="selectLeaveType('${x.key}')">

      ${x.icon} ${x.key}<small style="margin-left:auto;">${x.desc}</small>

    </button>

  `).join('');

 

  body.innerHTML = `

    <div class="card">

      <span class="card__label" style="color:#2B6CB0;">แจ้งลา / แจ้งสาย</span>

      <h2 class="card__title">${info.student.name}</h2>

      <p class="card__hint">${info.group.name}</p>

 

      <div style="font-size:13px; font-weight:600; margin:14px 0 8px;">1. เลือกคาบ</div>

      ${sessionsHtml}

 

      <div style="font-size:13px; font-weight:600; margin:16px 0 8px;">2. ประเภท</div>

      ${typesHtml}

 

      <div style="font-size:13px; font-weight:600; margin:16px 0 8px;">3. เหตุผล (แนะนำให้ระบุ)</div>

      <input type="text" class="note-section__input" id="leaveReason" placeholder="เช่น ไม่สบาย, ติดกิจกรรมโรงเรียน...">

 

      <div class="status-msg" id="leaveFormStatus"></div>

 

      <button class="btn btn--leave" style="width:100%; margin-top:16px;" onclick="submitLeaveRequest()">ส่งการแจ้ง</button>

      <button class="btn btn--ghost btn--sm" style="width:100%; margin-top:8px;" onclick="startLeaveFlow()">← กลับ</button>

    </div>

  `;

}

 

function selectLeaveSession(no) {

  state.leaveSel.sessionNo = no;

  const reason = document.getElementById('leaveReason');

  if (reason) state.leaveSel._reason = reason.value;

  renderLeaveForm();

  restoreLeaveReason();

}

function selectLeaveType(type) {

  state.leaveSel.type = type;

  const reason = document.getElementById('leaveReason');

  if (reason) state.leaveSel._reason = reason.value;

  renderLeaveForm();

  restoreLeaveReason();

}

function restoreLeaveReason() {

  const reason = document.getElementById('leaveReason');

  if (reason && state.leaveSel._reason) reason.value = state.leaveSel._reason;

}

 

async function submitLeaveRequest() {

  const statusEl = document.getElementById('leaveFormStatus');

  const show = (msg, type) => { statusEl.textContent = msg; statusEl.className = 'status-msg show ' + type; };

  if (!state.leaveSel.type) { show('เลือกประเภทก่อน (ลาป่วย / ลากิจ / แจ้งสาย)', 'error'); return; }

  const reason = (document.getElementById('leaveReason') || {}).value || '';

 

  show('กำลังส่ง...', 'info');

 

  if (!SCRIPT_URL) {

    setTimeout(() => renderLeaveSuccess(reason), 400);

    return;

  }

 

  try {

    const res = await fetch(SCRIPT_URL, {

      method: 'POST',

      headers: { 'Content-Type': 'text/plain;charset=utf-8' },

      body: JSON.stringify({

        action: 'submitLeave',

        pin: state.leavePin,

        sessionNo: state.leaveSel.sessionNo,

        type: state.leaveSel.type,

        reason: reason

      })

    });

    const result = await res.json();

    if (result.ok) {

      renderLeaveSuccess(reason);

    } else {

      show(result.error || 'ส่งไม่สำเร็จ', 'error');

    }

  } catch(e) {

    show('เชื่อมต่อไม่ได้: ' + e.message, 'error');

  }

}

 

function renderLeaveSuccess(reason) {

  state.step = 'leave_success';

  const info = state.leaveInfo;

  const sess = info.sessions.find(s => s.no === state.leaveSel.sessionNo);

  const body = document.getElementById('appBody');

  body.innerHTML = `

    <div class="card">

      <div class="success-screen">

        <div class="success-icon" style="background:#EAF2FB; color:#2B6CB0;">

          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>

        </div>

        <div class="success-name">${info.student.name}</div>

        <div class="success-status" style="color:#2B6CB0;">${state.leaveSel.type} · ส่งแล้ว</div>

        <div class="success-time">คาบที่ ${sess.no} · ${thDateFull(sess.date)}</div>

        ${reason ? `<div style="margin-top:8px; font-size:13px; color:var(--gray-dark);">เหตุผล: ${reason}</div>` : ''}

        <div style="margin-top:16px; padding:14px; background:var(--bg-soft); border-radius:10px; font-size:13px; color:var(--gray-dark);">

          ครูจะเห็นการแจ้งนี้ในระบบ${state.leaveSel.type === 'แจ้งสาย' ? ' — อย่าลืมเช็คชื่อตอนถึงห้องด้วย' : ' — คาบนี้จะถูกบันทึกเป็น "ลา" ไม่ใช่ "ขาด"'}

        </div>

        <button class="btn btn--primary" style="margin-top:16px; width:100%;" onclick="renderHome()">เสร็จสิ้น</button>

      </div>

    </div>

  `;

}

 

/* ===========================================================

   INIT

   =========================================================== */

function init() {

  // ถ้า URL มี ?code=XXX → กรอกให้อัตโนมัติ

  const params = new URLSearchParams(window.location.search);

  const urlCode = params.get('code');

  if (urlCode && /^\d{6}$/.test(urlCode)) {

    state.checkinCode = urlCode;

    renderCodeStep();

    renderCodeDisplay();

    setTimeout(() => {

      // แสดงข้อความว่ากำลังใช้รหัสจาก URL

      const statusEl = document.getElementById('codeStatus');

      if (statusEl) {

        statusEl.textContent = 'กำลังใช้รหัสจากลิงก์...';

        statusEl.className = 'status-msg show info';

      }

      verifyCheckinCode();

    }, 300);

  } else {

    renderHome();

  }

 

  // Keyboard support

  document.addEventListener('keydown', (e) => {

    if (state.step === 'code') {

      if (e.key >= '0' && e.key <= '9') handleCodeKeypad(e.key);

      else if (e.key === 'Backspace') handleCodeKeypad('back');

    } else if (state.step === 'pin') {

      if (e.key >= '0' && e.key <= '9') handlePinKeypad(e.key);

      else if (e.key === 'Backspace') handlePinKeypad('back');

    } else if (state.step === 'leave_pin') {

      if (e.key >= '0' && e.key <= '9') handleLeavePinKeypad(e.key);

      else if (e.key === 'Backspace') handleLeavePinKeypad('back');

    }

  });

}

 

init();

</script>

</body>

</html>
